const EQ_TYPES = {
  INV: { label:'Inversor',                  color:'#f59e0b', bg:'rgba(245,158,11,.12)' },
  ETP: { label:'ETP / PSU Huawei',          color:'#10b981', bg:'rgba(16,185,129,.12)' },
  ATS: { label:'Transferencia Automática',  color:'#3b82f6', bg:'rgba(59,130,246,.12)' },
  BAT: { label:'Banco de Baterías',         color:'#8b5cf6', bg:'rgba(139,92,246,.12)' },
  OTR: { label:'Otro',                      color:'#64748b', bg:'rgba(100,116,139,.12)' },
};

// Orden canónico de tipos para mostrar equipos
const EQ_ORDER = { INV:0, ETP:1, ATS:2, BAT:3, OTR:4 };

// Extrae identificador de banco del tag
// INV06-LFP00→LFP00 | BAT00-LFP→LFP00 | ETP02-AC-PV-NMC02→NMC02
const getBankId = tag => {
  const t = (tag||'').toUpperCase();
  const m1 = t.match(/(LFP|NMC|GEL|AGM|VRLA)(\d+)$/);
  if(m1) return m1[1]+m1[2];
  const m2 = t.match(/^BAT(\d+)[_-](LFP|NMC|GEL|AGM|VRLA)/);
  if(m2) return m2[2]+m2[1];
  return null;
};

// Agrupa equipos: no-BAT por banco → BAT al final del grupo → ATS/OTR al final
const groupByBank = (eqs) => {
  const nonBat = eqs.filter(e=>e.type!=='BAT'&&e.type!=='ATS'&&e.type!=='OTR');
  const bats    = eqs.filter(e=>e.type==='BAT');
  const atsotr  = eqs.filter(e=>e.type==='ATS'||e.type==='OTR');
  const groups = [];
  const seen = new Set();
  nonBat.forEach(eq=>{
    const bank = getBankId(eq.tag);
    if(!bank||seen.has(bank)) return;
    seen.add(bank);
    groups.push({
      bank,
      eqs: nonBat.filter(e=>getBankId(e.tag)===bank),
      bat: bats.find(b=>getBankId(b.tag)===bank)||null
    });
  });
  const ungrouped = nonBat.filter(e=>!getBankId(e.tag));
  if(ungrouped.length) groups.push({bank:null,eqs:ungrouped,bat:null});
  const orphanBats = bats.filter(b=>!nonBat.some(e=>getBankId(e.tag)===getBankId(b.tag)));
  if(orphanBats.length) groups.push({bank:'_orphan',eqs:[],bat:null,orphanBats});
  if(atsotr.length) groups.push({bank:'_ats',eqs:atsotr,bat:null});
  return groups;
};

// Calcula carga kW de un equipo dada sus mediciones
const calcLoad = (eqType, vals) => {
  if(!vals) return 0;
  if(eqType==='INV'){
    if(vals.load_kw) return parseFloat(vals.load_kw)||0;
    const l1=(parseFloat(vals.L1_pot)||0), l2=(parseFloat(vals.L2_pot)||0);
    return l1+l2;
  }
  if(eqType==='ETP'){
    return (parseFloat(vals.AC_load)||0)+(parseFloat(vals.DC_load)||0);
  }
  return 0;
};

// Voltaje nominal por tipo de batería (V)
const BAT_VN = { LFP:48, GEL:48, AGM:48, VRLA:48, NMC:52.5 };
// Valores por defecto para autonomía según tipo
const BAT_DEFAULTS = {
  LFP:  {DoD:0.8, SoH:1.0, ebanco:0.98, eTemp:1.0, ereg:0.85},
  NMC:  {DoD:0.8, SoH:0.45, ebanco:0.95, eTemp:1.0, ereg:0.85},
  GEL:  {DoD:0.6, SoH:0.25, ebanco:0.95, eTemp:1.0, ereg:0.85},
  AGM:  {DoD:0.6, SoH:0.25, ebanco:0.95, eTemp:1.0, ereg:0.85},
  VRLA: {DoD:0.6, SoH:0.25, ebanco:0.95, eTemp:1.0, ereg:0.85},
};
// t = (Vn × Cap × SoH × DoD × ebanco × eTemp) / (Carga_W / ereg)
const calcAutonomy = (batEq, loadKW) => {
  if(!batEq||!loadKW||loadKW<=0) return null;
  const cap  = parseFloat(batEq.batCapacity)||0;
  const type = batEq.batteryType||'LFP';
  if(!cap) return null;
  const Vn = BAT_VN[type]||48;
  const def = BAT_DEFAULTS[type]||BAT_DEFAULTS.LFP;
  const DoD   = parseFloat(batEq.batDoD)  || def.DoD;
  const SoH   = parseFloat(batEq.batSoH)  || def.SoH;
  const eb    = parseFloat(batEq.batEbanco)|| def.ebanco;
  const eT    = parseFloat(batEq.batETemp) || def.eTemp;
  const ereg  = def.ereg;
  const loadW = loadKW * 1000;
  const tHours = (Vn * cap * SoH * DoD * eb * eT) / (loadW / ereg);
  return tHours;
};
const fmtHours = h => {
  if(!h||h<=0) return '—';
  const hh=Math.floor(h), mm=Math.round((h-hh)*60);
  return `${hh}h ${mm.toString().padStart(2,'0')}min`;
};
const sortEquipment = eqs => [...eqs].sort((a,b) => {
  const oa = EQ_ORDER[a.type]??5, ob = EQ_ORDER[b.type]??5;
  if(oa!==ob) return oa-ob;
  return (a.tag||'').localeCompare(b.tag||'', 'es', {numeric:true});
});

// ⚡ TABLA DE AMPACIDAD POR CALIBRE AWG (A máx en cobre, 75°C)
// ═══════════════════════════════════════════════════
const AWG_AMPACITY = {
  '14 AWG':15, '12 AWG':20, '10 AWG':30, '8 AWG':50,
  '6 AWG':65,  '4 AWG':85,  '3 AWG':100,'2 AWG':115,
  '1 AWG':130, '1/0 AWG':150,'2/0 AWG':175,'3/0 AWG':200,

};
const AWG_OPTIONS = Object.keys(AWG_AMPACITY);

// Chequea si algún ATS supera la ampacidad de su cable
const checkAtsAlarms = (measurements, equipment) => {
  const alarms = [];
  Object.entries(measurements).forEach(([tag, vals]) => {
    if(!tag.toUpperCase().startsWith('ATS')) return;
    const eq = equipment.find(e=>e.tag===tag)||{};
    const calibre = eq.conductorGauge;
    if(!calibre) return;
    const maxA = AWG_AMPACITY[calibre];
    if(!maxA) return;
    ['L1','L2','L3','N'].forEach(line=>{
      const a = parseFloat(vals[line]);
      if(!isNaN(a) && a > maxA) {
        alarms.push({tag, line, measured:a, maxA, calibre});
      }
    });
  });
  return alarms;
};

function EqMeasurements({ eq, vals, onChange }) {
  if (eq.type==='INV') {
    const is220 = eq.voltage==='220V';
    const hasPV = eq.hasSolar;
    return (
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        <MF label="Carga L1" unit="%" vals={vals} k="L1_carga" onChange={onChange} />
        <MF label="Potencia L1" unit="kW" vals={vals} k="L1_pot" onChange={onChange} />
        {is220 && <><MF label="Carga L2" unit="%" vals={vals} k="L2_carga" onChange={onChange} /><MF label="Potencia L2" unit="kW" vals={vals} k="L2_pot" onChange={onChange} /></>}
        <MF label="V AC OUT" unit="Vac" vals={vals} k="V_ac_out" onChange={onChange} />
        <MF label="Carga Total" unit="kW" vals={vals} k="load_kw" onChange={onChange} />
        {hasPV && <><MF label="V Paneles" unit="V" vals={vals} k="V_panel" onChange={onChange} /><MF label="P Paneles" unit="kW" vals={vals} k="P_panel" onChange={onChange} /></>}
        <MF label="I Batería" unit="Adc" vals={vals} k="I_bat" onChange={onChange} />
        <MF label="V DC OUT" unit="VDC" vals={vals} k="V_dc_out" onChange={onChange} />
      </div>
    );
  }
  if (eq.type==='ETP') return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      <MF label="DC Load" unit="kW" vals={vals} k="DC_load" onChange={onChange} />
      <MF label="AC Load" unit="kW" vals={vals} k="AC_load" onChange={onChange} />
      <MF label="I Bat" unit="Acc" vals={vals} k="I_bat" onChange={onChange} />
      {eq.hasSolar && <><MF label="V Paneles" unit="V" vals={vals} k="V_panel" onChange={onChange} /><MF label="I Paneles" unit="A" vals={vals} k="I_panel" onChange={onChange} /></>}
    </div>
  );
  if (eq.type==='ATS') {
    const maxA = eq.conductorGauge ? AWG_AMPACITY[eq.conductorGauge] : null;
    const alarm = (line) => {
      if(!maxA) return false;
      const v=parseFloat(vals[line]);
      return !isNaN(v) && v > maxA;
    };
    return (
      <div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:8}}>
          {['L1','L2','L3','N'].map(line=>(
            <div key={line}>
              <label style={{display:'block',fontSize:'.68rem',marginBottom:3,fontFamily:"'Exo 2',sans-serif",textTransform:'uppercase',letterSpacing:'.05em',
                color:alarm(line)?'#ef4444':'#475569'}}>
                {line} <span style={{color:alarm(line)?'#ef4444':'#f59e0b'}}>A{alarm(line)?' ⚠️':''}</span>
              </label>
              <input className="mi" type="number" step="any" value={vals[line]??''} onChange={e=>onChange(line,e.target.value)}
                placeholder="—" style={{borderColor:alarm(line)?'#ef4444':undefined}} />
            </div>
          ))}
        </div>
        {eq.conductorGauge && (
          <div style={{fontSize:'.72rem',color:maxA?'#64748b':'#475569',background:'rgba(0,0,0,.15)',borderRadius:5,padding:'4px 8px'}}>
            Cable: <span style={{color:'#3b82f6',fontWeight:600}}>{eq.conductorGauge}</span> → máx <span style={{color:'#3b82f6',fontWeight:600}}>{maxA}A</span>
            {maxA && ['L1','L2','L3'].some(l=>alarm(l)) && (
              <span style={{color:'#ef4444',fontWeight:700,marginLeft:8}}>⚠️ ¡Amperaje fuera de rango!</span>
            )}
          </div>
        )}
      </div>
    );
  }
  if (eq.type==='BAT') return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
      <MF label="V Banco" unit="VDC" vals={vals} k="V_banco" onChange={onChange} />
      <MF label="I Banco" unit="A" vals={vals} k="I_banco" onChange={onChange} />
    </div>
  );
  return (
    <div>
      <label className="lbl">Observaciones / Mediciones libres</label>
      <textarea className="fi" rows={3} value={vals.libre||''} onChange={e=>onChange('libre',e.target.value)} placeholder="Describe el estado del equipo..." style={{resize:'vertical'}} />
    </div>
  );
}

// 📋 GENERADOR DE REPORTE DE INSPECCIÓN
// ═══════════════════════════════════════════════════
const DIAS_ES = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MESES_ES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

const FIELD_LABELS = {
  L1_carga:'L1', L1_pot:'L1', L2_carga:'L2', L2_pot:'L2',
  V_ac_out:'Vout', load_kw:'Load', V_panel:'Vpaneles', P_panel:'Ppaneles',
  I_bat:'Ibateria', V_dc_out:'V DC OUT',
  DC_load:'DC Load', AC_load:'AC Load', I_panel:'Ipaneles',
  L1:'L1', L2:'L2', N:'N',
  V_banco:'V Banco', I_banco:'I Banco',
  libre:'Notas'
};
const FIELD_UNITS = {
  L1_carga:'%', L1_pot:'kW', L2_carga:'%', L2_pot:'kW',
  V_ac_out:'Vac', load_kw:'kW', V_panel:'V', P_panel:'kW',
  I_bat:'Adc', V_dc_out:'VDC',
  DC_load:'kW', AC_load:'kW', I_bat:'Acc', I_panel:'A',
  L1:'A', L2:'A', N:'A',
  V_banco:'VDC', I_banco:'A',
};

function generateReportText({nodeName, date, shift, technicianName, measurements, observations, equipment}) {
  const d = date instanceof Date ? date : new Date(date);
  const dia = DIAS_ES[d.getDay()];
  const diaNum = String(d.getDate()).padStart(2,'0');
  const mes = String(d.getMonth()+1).padStart(2,'0');
  const anio = d.getFullYear();
  const fechaStr = `${diaNum}/${mes}/${anio}`;
  const diaCap = dia.charAt(0).toUpperCase()+dia.slice(1);

  const fmtVal = (k,v) => {
    if(v===''||v===null||v===undefined) return null;
    const lbl = FIELD_LABELS[k]||k.replace(/_/g,' ');
    const unit = FIELD_UNITS[k]||'';
    return `${lbl}: ${v}${unit?' '+unit:''}`;
  };

  const printEq = (tag, lines) => {
    const vals = measurements[tag];
    if(!vals) return;
    lines.push(tag);
    Object.entries(vals).forEach(([k,v])=>{
      const s = fmtVal(k,v); if(s) lines.push(s);
    });
  };

  let lines = [];
  lines.push(`${diaCap} ${fechaStr} se realizó el mantenimiento preventivo en el cuarto de energía del ${nodeName}.`);
  lines.push('');

  // Equipos medidos — ordenados y agrupados por banco
  const measuredEqs = sortEquipment(
    equipment.filter(e=>measurements[e.tag]&&Object.keys(measurements[e.tag]).some(k=>measurements[e.tag][k]!==''))
  );
  const groups = groupByBank(measuredEqs);

  groups.forEach(({bank, eqs, bat, orphanBats}) => {
    if(bank==='_ats') {
      // ATS va al final con su sección
      eqs.forEach(eq => { printEq(eq.tag, lines); lines.push(''); });
      return;
    }
    // Equipos del grupo
    eqs.forEach(eq => { printEq(eq.tag, lines); });
    // Voltaje del banco al final del grupo
    if(bat && measurements[bat.tag]) {
      const vb = measurements[bat.tag].V_banco;
      if(vb) lines.push(`V Banco ${bank}: ${vb} Vdc`);
    }
    lines.push('');
    // Bancos huérfanos
    if(orphanBats) orphanBats.forEach(eq => { printEq(eq.tag, lines); lines.push(''); });
  });

  if(observations && observations.trim()) {
    lines.push('Observaciones:');
    observations.trim().split('\n').forEach(l=>{
      lines.push(l.startsWith('-')?l:'- '+l);
    });
    lines.push('');
  }

  lines.push(`Para la realización de esta actividad se contó con el apoyo del personal:`);
  lines.push(`        - ${technicianName}`);

  return lines.join('\n');
}

function ReportModal({ data, onClose }) {
  const [text,setText]=useState(()=>generateReportText(data));
  const [copied,setCopied]=useState(false);

        </div>
      </div>

      <div className="card" style={{marginBottom:14,background:'var(--bg-deep)',borderColor:'rgba(16,185,129,.2)'}}>

    </div>
  );
}

// 📝 FORMULARIO DE REGISTRO
// ═══════════════════════════════════════════════════
function RecordForm({ nodeId, nodeName, equipment, userProfile, onSave, onCancel, toast }) {
  const [type,setType]=useState('inspeccion');
  const [date,setDate]=useState(new Date().toISOString().slice(0,16));
  const [shift,setShift]=useState('dia');
  const [obs,setObs]=useState('');
  const [participants,setParticipants]=useState('');
  const [meas,setMeas]=useState({});
  const [saving,setSaving]=useState(false);
  const [eqAction,setEqA]=useState({tag:'',type:'INV',voltage:'220V',hasAcIn:false,hasAcOut:true,hasDcOut:false,hasSolar:false,batteryType:'LFP',batCapacity:'',batCount:'',batCellType:'No aplica',serial:'',notes:''});
  const [reportData,setReportData]=useState(null);

  const updM=(tag,k,v)=>setMeas(p=>({...p,[tag]:{...(p[tag]||{}),[k]:v}}));
  const active=sortEquipment(equipment.filter(e=>e.active!==false));

  const save = async () => {
    if (!date){toast('Selecciona la fecha.','error');return;}
    setSaving(true);
    try {
      const cleanMeas={};
      Object.entries(meas).forEach(([tag,fields])=>{
        const filled=Object.fromEntries(Object.entries(fields).filter(([,v])=>v!==''&&v!==null&&v!==undefined));
        if(Object.keys(filled).length>0) cleanMeas[tag]=filled;
      });
      const record = {
        type, date:new Date(date), shift, observations:obs,
        technicianId:userProfile.uid, technicianName:userProfile.name,
        participants: participants.trim(),
        measurements: type==='inspeccion' ? cleanMeas : {},
        equipmentAction: type!=='inspeccion' ? eqAction : null,
        createdAt:TS()
      };
      await db.collection('energy_nodes').doc(nodeId).collection('energy_records').add(record);
      if (type==='instalacion' && eqAction.tag) {
        await db.collection('energy_nodes').doc(nodeId).collection('energy_equipment').add({
          tag:eqAction.tag, type:eqAction.type, voltage:eqAction.voltage,
          hasAcIn:!!eqAction.hasAcIn, hasAcOut:!!eqAction.hasAcOut, hasDcOut:!!eqAction.hasDcOut,
          hasSolar:eqAction.hasSolar, batteryType:eqAction.batteryType,
          batCapacity:eqAction.batCapacity||'', batCount:eqAction.batCount||'',
          batCellType:eqAction.batCellType||'No aplica', serial:eqAction.serial||'',
          active:true, installedAt:new Date(date), installedBy:userProfile.name, notes:eqAction.notes
        });
      }
      if (type==='reemplazo' && eqAction.tag) {
        const eq=active.find(e=>e.tag===eqAction.tag);
        if(eq) await db.collection('energy_nodes').doc(nodeId).collection('energy_equipment').doc(eq.id).update({active:false,retiredAt:new Date(date)});
      }
      toast('Registro guardado exitosamente.','success');
      // Verificar alarmas de conductores ATS
      if(type==='inspeccion') {
        const alarms = checkAtsAlarms(cleanMeas, active);
        if(alarms.length>0) {
          const msg = alarms.map(a=>`${a.tag} - ${a.line}: ${a.measured}A > ${a.maxA}A (Cable ${a.calibre})`).join('\n');
          toast('⚠️ Amperaje fuera de rango en '+alarms.map(a=>a.tag).join(', '), 'error');
          // Enviar email de alarma via EmailJS
          if(window.emailjs && EMAILJS_SERVICE_ID!=='TU_SERVICE_ID') {
            window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    nodo:        nodeName,
              tecnico:     userProfile.name,
              fecha:       new Date(date).toLocaleDateString('es-VE'),
              alarmas:     msg,
              observaciones: obs||'Sin observaciones',
            }, EMAILJS_PUBLIC_KEY).catch(e=>console.warn('EmailJS error:',e));
          }
        }
      }
      // Mostrar reporte si es inspección con mediciones
      if(type==='inspeccion' && Object.keys(cleanMeas).length>0) {
        setReportData({nodeName, date:new Date(date), shift, technicianName:userProfile.name, measurements:cleanMeas, observations:obs, equipment:active});
      } else {
        onSave();
      }
    } catch(e) { console.error(e); toast('Error al guardar. Intenta de nuevo.','error'); }
    setSaving(false);
  };

  if(reportData) return <ReportModal data={reportData} onClose={onSave} />;

  return (
    <div className="fin">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:22}}>
        <button onClick={onCancel} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:22}}>←</button>
        <div>
          <h2 className="fd" style={{fontSize:'1.1rem',fontWeight:700,color:'var(--tx1)'}}>Nuevo Registro</h2>
          <p style={{color:'var(--tx3)',fontSize:'.8rem'}}>{nodeName}</p>
        </div>
      </div>

      {/* Info general */}
      <div className="card" style={{marginBottom:14}}>
        <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>Información General</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div>
            <label className="lbl">Tipo de Registro</label>
            <select className="fi" value={type} onChange={e=>setType(e.target.value)}>
              {Object.entries(REC_TYPES).map(([k,v])=><option key={k} value={k}>{v.icon} {v.label}</option>)}
            </select>
          </div>
          <div>
            <label className="lbl">Turno</label>
            <select className="fi" value={shift} onChange={e=>setShift(e.target.value)}>
              <option value="dia">☀️ Día</option>
              <option value="noche">🌙 Noche</option>
            </select>
          </div>
          <div style={{gridColumn:'1/-1'}}>
            <label className="lbl">Fecha y Hora</label>
            <input className="fi" type="datetime-local" value={date} onChange={e=>setDate(e.target.value)} />
          </div>
          <div style={{gridColumn:'1/-1'}}>
            <label className="lbl">Personal que realizó la inspección</label>
            <input className="fi" value={participants} onChange={e=>setParticipants(e.target.value)}
              placeholder="Ej: Juan Pérez, Carlos Rodríguez, María González" />
            <div style={{fontSize:'.7rem',color:'var(--tx4)',marginTop:3}}>Nombres y apellidos separados por coma</div>
          </div>
        </div>
      </div>

      {/* Mediciones — agrupadas por banco */}
      {type==='inspeccion' && (
        active.length===0
          ? <div className="card" style={{textAlign:'center',marginBottom:14,padding:30}}>
              <p style={{color:'var(--tx3)',marginBottom:12}}>No hay equipos activos en este nodo.</p>
              <button className="bp" style={{fontSize:'.82rem'}} onClick={()=>setType('instalacion')}>Registrar Instalación</button>
            </div>
          : (() => {
              const groups = groupByBank(active);

              return groups.map(({bank, eqs, bat, orphanBats}) => (
                <div key={bank||'_ung'} style={{marginBottom:20}}>
                  {/* Equipos del grupo */}
                  {eqs.map(eq=>{
                    const ti=EQ_TYPES[eq.type]||EQ_TYPES.OTR;
                    return (
                      <div key={eq.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${ti.color}`}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                          <span className="badge" style={{background:ti.bg,color:ti.color}}>{eq.type}</span>
                          <span className="fm" style={{fontSize:'.88rem',color:'var(--tx1)',fontWeight:600}}>{eq.tag}</span>
                          {eq.voltage && <span style={{color:'var(--tx3)',fontSize:'.74rem'}}>⚡{eq.voltage}</span>}
                          {eq.hasAcIn  && <span style={{color:'#3b82f6',fontSize:'.74rem'}}>AC/IN</span>}
                          {eq.hasAcOut && <span style={{color:'#10b981',fontSize:'.74rem'}}>AC/OUT</span>}
                          {eq.hasDcOut && <span style={{color:'#8b5cf6',fontSize:'.74rem'}}>DC/OUT</span>}
                          {eq.hasSolar && <span style={{color:'#f59e0b',fontSize:'.74rem'}}>☀️PV</span>}
                          {eq.batteryType&&eq.batteryType!=='No aplica'&&<span style={{color:'#8b5cf6',fontSize:'.74rem'}}>🔋{eq.batteryType}</span>}
                        </div>
                        <EqMeasurements eq={eq} vals={meas[eq.tag]||{}} onChange={(k,v)=>updM(eq.tag,k,v)} />
                      </div>
                    );
                  })}
                  {/* Banco asociado al final del grupo */}
                  {bat && (()=>{
                    const ti=EQ_TYPES.BAT;
                    return (
                      <div key={bat.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${ti.color}`,background:'rgba(139,92,246,.04)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                          <span className="badge" style={{background:ti.bg,color:ti.color}}>BAT</span>
                          <span className="fm" style={{fontSize:'.88rem',color:'var(--tx1)',fontWeight:600}}>{bat.tag}</span>
                          {bat.batteryType&&bat.batteryType!=='No aplica'&&<span style={{color:'#8b5cf6',fontSize:'.74rem'}}>🔋{bat.batteryType}</span>}
                          {bat.batCapacity&&<span style={{color:'#8b5cf6',fontSize:'.74rem'}}>{bat.batCapacity}Ah</span>}
                          {bat.batCount&&<span style={{color:'#64748b',fontSize:'.74rem'}}>{bat.batCount} bat.</span>}
                        </div>
                        <EqMeasurements eq={bat} vals={meas[bat.tag]||{}} onChange={(k,v)=>updM(bat.tag,k,v)} />
                      </div>
                    );
                  })()}
                  {/* Bancos huérfanos */}
                  {orphanBats && orphanBats.map(bat=>{
                    const ti=EQ_TYPES.BAT;
                    return (
                      <div key={bat.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${ti.color}`,background:'rgba(139,92,246,.04)'}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                          <span className="badge" style={{background:ti.bg,color:ti.color}}>BAT</span>
                          <span className="fm" style={{fontSize:'.88rem',color:'var(--tx1)',fontWeight:600}}>{bat.tag}</span>
                          {bat.batteryType&&bat.batteryType!=='No aplica'&&<span style={{color:'#8b5cf6',fontSize:'.74rem'}}>🔋{bat.batteryType}</span>}
                          {bat.batCapacity&&<span style={{color:'#8b5cf6',fontSize:'.74rem'}}>{bat.batCapacity}Ah</span>}
                        </div>
                        <EqMeasurements eq={bat} vals={meas[bat.tag]||{}} onChange={(k,v)=>updM(bat.tag,k,v)} />
                      </div>
                    );
                  })}
                </div>
              ));
            })()
      )}

      {/* Instalación */}
      {type==='instalacion' && (
        <div className="card" style={{marginBottom:14}}>
          <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>⚡ Equipo a Instalar</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label className="lbl">Tag / Identificador del Equipo</label>
              <input className="fi fm" value={eqAction.tag} onChange={e=>setEqA({...eqAction,tag:e.target.value})} placeholder="Ej: INV00-PV-LFP00" />
            </div>
            <div>
              <label className="lbl">Serial del Equipo <span style={{color:'var(--tx4)',fontWeight:400,textTransform:'none'}}>(opcional)</span></label>
              <input className="fi fm" value={eqAction.serial||''} onChange={e=>setEqA({...eqAction,serial:e.target.value})} placeholder="Ej: P02362013757" />
            </div>
            <div>
              <label className="lbl">Tipo</label>
              <select className="fi" value={eqAction.type} onChange={e=>setEqA({...eqAction,type:e.target.value})}>
                {Object.entries(EQ_TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
            {eqAction.type==='INV' && <>
              <div>
                <label className="lbl">Tensión de Salida</label>
                <select className="fi" value={eqAction.voltage} onChange={e=>setEqA({...eqAction,voltage:e.target.value})}>
                  <option value="110V">110V (1 Línea)</option>
                  <option value="220V">220V (2 Líneas)</option>
                </select>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8,paddingTop:4}}>
                <label className="lbl" style={{marginBottom:0}}>Conexiones</label>
                {[
                  ['hasAcIn',  '🔌 Entrada AC (cargador/bypass)'],
                  ['hasAcOut', '⚡ Salida AC'],
                  ['hasDcOut', '🔋 Salida DC'],
                  ['hasSolar', '☀️ Entrada PV (paneles solares)'],
                ].map(([k,lbl])=>(
                  <label key={k} style={{display:'flex',alignItems:'center',gap:8,color:'var(--tx2)',fontSize:'.85rem',cursor:'pointer'}}>
                    <input type="checkbox" checked={!!eqAction[k]} onChange={e=>setEqA({...eqAction,[k]:e.target.checked})} />
                    {lbl}
                  </label>
                ))}
              </div>
            </>}
            {(eqAction.type==='INV'||eqAction.type==='BAT'||eqAction.type==='ETP') && (
              <div>
                <label className="lbl">Tipo de Batería</label>
                <select className="fi" value={eqAction.batteryType} onChange={e=>setEqA({...eqAction,batteryType:e.target.value})}>
                  {BAT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            )}
            {eqAction.type==='BAT' && <>
              <div>
                <label className="lbl">Capacidad del Banco (Ah)</label>
                <input className="fi" type="number" step="any" value={eqAction.batCapacity} onChange={e=>setEqA({...eqAction,batCapacity:e.target.value})} placeholder="Ej: 200" />
              </div>
              <div>
                <label className="lbl">Número de Baterías</label>
                <input className="fi" type="number" step="1" value={eqAction.batCount} onChange={e=>setEqA({...eqAction,batCount:e.target.value})} placeholder="Ej: 4" />
              </div>
              <div>
                <label className="lbl">Tipo de Celda</label>
                <select className="fi" value={eqAction.batCellType} onChange={e=>setEqA({...eqAction,batCellType:e.target.value})}>
                  {BAT_CELL_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            </>}
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Notas del Equipo (opcional)</label>
              <input className="fi" value={eqAction.notes} onChange={e=>setEqA({...eqAction,notes:e.target.value})} placeholder="Modelo, serie, notas adicionales..." />
            </div>
          </div>
        </div>
      )}

      {/* Reemplazo/Retiro */}
      {type==='reemplazo' && (
        <div className="card" style={{marginBottom:14}}>
          <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>🔄 Equipo a Reemplazar / Retirar</h3>
          <div>
            <label className="lbl">Seleccionar Equipo</label>
            <select className="fi" value={eqAction.tag} onChange={e=>setEqA({...eqAction,tag:e.target.value})}>
              <option value="">-- Selecciona el equipo a retirar --</option>
              {active.map(eq=><option key={eq.id} value={eq.tag}>{eq.tag} ({eq.type})</option>)}
            </select>
          </div>
          <div style={{marginTop:12}}>
            <label className="lbl">Motivo del Retiro</label>
            <input className="fi" value={eqAction.notes} onChange={e=>setEqA({...eqAction,notes:e.target.value})} placeholder="Falla, actualización, reubicación..." />
          </div>
        </div>
      )}

      {/* Correctivo */}
      {type==='correctivo' && (
        <div className="card" style={{marginBottom:14}}>
          <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>🔧 Detalle del Correctivo</h3>
          <div>
            <label className="lbl">Equipo afectado (opcional)</label>
            <select className="fi" value={eqAction.tag} onChange={e=>setEqA({...eqAction,tag:e.target.value})}>
              <option value="">-- General / sin equipo específico --</option>
              {active.map(eq=><option key={eq.id} value={eq.tag}>{eq.tag}</option>)}
            </select>
          </div>
        </div>
      )}

      {/* Observaciones */}
      <div className="card" style={{marginBottom:20}}>
        <label className="lbl">Observaciones</label>
        <textarea className="fi" rows={4} value={obs} onChange={e=>setObs(e.target.value)} placeholder="Condiciones del nodo, anomalías detectadas, trabajos realizados..." style={{resize:'vertical'}} />
      </div>

      <div style={{display:'flex',gap:12}}>
        <button className="bp" style={{flex:1}} onClick={save} disabled={saving}>{saving?'Guardando...':'💾 Guardar Registro'}</button>
        <button className="bs" onClick={onCancel} disabled={saving}>Cancelar</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 🔎 DETALLE DE REGISTRO
// ═══════════════════════════════════════════════════
function RecordDetail({ record, onBack, nodeId }) {
  const rt = REC_TYPES[record.type]||{label:record.type,icon:'📋',color:'#64748b'};
  const [editMeas,setEditMeas]=React.useState(false);
  const [measEdit,setMeasEdit]=React.useState(null); // snapshot editable
  const [saving,setSaving]=React.useState(false);

  const openEdit = () => {
    // Deep clone measurements
    setMeasEdit(JSON.parse(JSON.stringify(record.measurements||{})));
    setEditMeas(true);
  };
  const saveEdit = async () => {
    if(!nodeId||!record.id) return;
    setSaving(true);
    try {
      await db.collection('energy_nodes').doc(nodeId).collection('energy_records').doc(record.id).update({measurements:measEdit});
      // Update local record object so view reflects changes
      Object.assign(record.measurements, measEdit);
      setEditMeas(false);
    } catch(e){console.error(e);}
    setSaving(false);
  };
  const II = ({label,value,mono}) => (
    <div>
      <div style={{fontSize:'.68rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2,fontFamily:"'Exo 2',sans-serif"}}>{label}</div>
      <div className={mono?'fm':''} style={{fontSize:'.9rem',color:'var(--tx1)',fontWeight:500}}>{value||'—'}</div>
    </div>
  );
  return (
    <div className="fin">
      {editMeas && (
        <div className="overlay" onClick={()=>setEditMeas(false)}>
          <div className="card fin" style={{maxWidth:560,width:'100%',maxHeight:'88vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <h3 className="fd" style={{fontWeight:700,color:'var(--amber)',fontSize:'1rem'}}>✏️ Editar Mediciones</h3>
              <button onClick={()=>setEditMeas(false)} style={{background:'none',border:'none',color:'var(--tx3)',cursor:'pointer',fontSize:20}}>✕</button>
            </div>
            {Object.entries(measEdit).map(([tag,vals])=>(
              <div key={tag} className="card" style={{marginBottom:10,borderLeft:'3px solid var(--amber)'}}>
                <div className="fm" style={{fontSize:'.85rem',color:'var(--amber)',fontWeight:700,marginBottom:10}}>{tag}</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {Object.entries(vals).map(([k,v])=>(
                    <div key={k}>
                      <label style={{display:'block',fontSize:'.65rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3,fontFamily:"'Exo 2',sans-serif"}}>
                        {FIELD_LABELS[k]||k} <span style={{color:'var(--amber)'}}>{FIELD_UNITS[k]||''}</span>
                      </label>
                      <input className="mi" type="number" step="any" value={measEdit[tag][k]??''}
                        onChange={e=>setMeasEdit(prev=>{const n=JSON.parse(JSON.stringify(prev));n[tag][k]=e.target.value;return n;})}/>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <div style={{display:'flex',gap:10,marginTop:14}}>
              <button className="bp" style={{flex:1}} onClick={saveEdit} disabled={saving}>{saving?'Guardando...':'💾 Guardar Cambios'}</button>
              <button className="bs" onClick={()=>setEditMeas(false)} disabled={saving}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:22}}>←</button>
          <div>
            <h2 className="fd" style={{fontSize:'1.1rem',fontWeight:700,color:'var(--tx1)'}}>{rt.icon} {rt.label}</h2>
            <p style={{color:'var(--tx3)',fontSize:'.8rem'}}>{fmtDateTime(record.date)}</p>
          </div>
        </div>
        {record.type==='inspeccion'&&record.measurements&&Object.keys(record.measurements).length>0&&(
          <button onClick={openEdit} className="bs" style={{padding:'6px 14px',fontSize:'.78rem'}}>✏️ Editar valores</button>
        )}
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <II label="Registrado por" value={record.technicianName} />
          <II label="Turno" value={record.shift==='dia'?'☀️ Día':'🌙 Noche'} />
          <II label="Fecha" value={fmtDate(record.date)} />
          <II label="Hora" value={record.date?.toDate?record.date.toDate().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}):'—'} />
          {record.participants&&<div style={{gridColumn:'1/-1'}}>
            <div style={{fontSize:'.68rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2,fontFamily:"'Exo 2',sans-serif"}}>Personal Involucrado</div>
            <div style={{fontSize:'.88rem',color:'var(--tx1)',fontWeight:500}}>{record.participants}</div>
          </div>}
        </div>
        {record.observations && <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:'.7rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4,fontFamily:"'Exo 2',sans-serif"}}>Observaciones</div>
          <p style={{color:'#cbd5e1',fontSize:'.9rem'}}>{record.observations}</p>
        </div>}
      </div>
      {record.measurements && Object.keys(record.measurements).length>0 && (()=>{
        // Reconstruir lista de equipos medidos para agrupar por banco
        const meas = record.measurements;
        const measTags = Object.keys(meas);
        // Crear objetos de equipo ficticios desde los tags medidos
        const fakeEqs = sortEquipment(measTags.map(tag=>{
          const t=tag.toUpperCase();
          const type = t.startsWith('INV')?'INV':t.startsWith('ETP')?'ETP':t.startsWith('ATS')?'ATS':t.startsWith('BAT')?'BAT':'OTR';
          return {id:tag,tag,type,active:true};
        }));
        const groups = groupByBank(fakeEqs);
        // Calcular carga total del nodo
        const totalLoad = measTags.reduce((sum,tag)=>{
          const type=tag.toUpperCase().startsWith('INV')?'INV':tag.toUpperCase().startsWith('ETP')?'ETP':'OTR';
          return sum+calcLoad(type,meas[tag]);
        },0);

        const MeasCard = ({tag,highlight}) => {
          const vals=meas[tag]||{};
          const type=tag.toUpperCase().startsWith('INV')?'INV':tag.toUpperCase().startsWith('ETP')?'ETP':tag.toUpperCase().startsWith('ATS')?'ATS':tag.toUpperCase().startsWith('BAT')?'BAT':'OTR';
          const ti=EQ_TYPES[type]||EQ_TYPES.OTR;
          const load=calcLoad(type,vals);
          return (
            <div style={{background:highlight?'rgba(139,92,246,.06)':'var(--bg-surface)',borderRadius:7,padding:'10px 12px',marginBottom:6,border:`1px solid ${highlight?'rgba(139,92,246,.2)':'var(--border)'}`}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8,flexWrap:'wrap',gap:6}}>
                <div style={{display:'flex',alignItems:'center',gap:7}}>
                  <span className="badge" style={{background:ti.bg,color:ti.color,fontSize:'.62rem'}}>{type}</span>
                  <span className="fm" style={{fontSize:'.88rem',color:'var(--tx1)',fontWeight:600}}>{tag}</span>
                </div>
                {load>0&&<span className="fm" style={{fontSize:'.8rem',color:'#10b981',fontWeight:700}}>{load.toFixed(2)} kW</span>}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:6}}>
                {Object.entries(vals).filter(([,v])=>v!==''&&v!==null).map(([k,v])=>(
                  <div key={k} style={{background:'var(--bg-deep)',borderRadius:5,padding:'6px 8px'}}>
                    <div style={{fontSize:'.6rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:1,fontFamily:"'Exo 2',sans-serif"}}>{(FIELD_LABELS[k]||k.replace(/_/g,' '))} <span style={{color:'var(--amber)',fontWeight:600}}>{FIELD_UNITS[k]||''}</span></div>
                    <div className="fm" style={{fontSize:'.95rem',color:'#10b981',fontWeight:600}}>{v}</div>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        return (
          <div>
            {/* Carga total del nodo */}
            {totalLoad>0&&<div style={{background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em'}}>Carga Total del Nodo</span>
              <span className="fm" style={{fontSize:'1.3rem',fontWeight:800,color:'#10b981'}}>{totalLoad.toFixed(2)} <span style={{fontSize:'.8rem'}}>kW</span></span>
            </div>}
            <h3 className="fd" style={{fontSize:'.75rem',fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:10}}>Mediciones Registradas</h3>
            {groups.map(({bank,eqs,bat,orphanBats})=>{
              const bankLoad = eqs.reduce((s,e)=>s+calcLoad(e.type,meas[e.tag]),0);
              return (
                <div key={bank||'_ung'} style={{marginBottom:16}}>
                  {bank&&bank!=='_ats'&&bank!=='_orphan'&&<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:'.68rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',fontFamily:"'Exo 2',sans-serif"}}>Banco {bank}</span>
                    {bankLoad>0&&<span className="fm" style={{fontSize:'.8rem',color:'#f59e0b',fontWeight:700}}>Σ {bankLoad.toFixed(2)} kW</span>}
                  </div>}
                  {eqs.map(e=><MeasCard key={e.tag} tag={e.tag} highlight={false}/>)}
                  {bat&&meas[bat.tag]&&<MeasCard key={bat.tag} tag={bat.tag} highlight={true}/>}
                  {orphanBats&&orphanBats.map(e=><MeasCard key={e.tag} tag={e.tag} highlight={true}/>)}
                </div>
              );
            })}
          </div>
        );
      })()}
      {record.equipmentAction && (record.equipmentAction.tag||record.equipmentAction.type) && (
        <div className="card">
          <h3 className="fd" style={{fontSize:'.75rem',fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:12}}>Acción de Equipo</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            {record.equipmentAction.tag && <II label="Tag" value={record.equipmentAction.tag} mono />}
            {record.equipmentAction.type && <II label="Tipo" value={record.equipmentAction.type} />}
            {record.equipmentAction.voltage && <II label="Tensión" value={record.equipmentAction.voltage} />}
            {record.equipmentAction.batteryType && record.equipmentAction.batteryType!=='No aplica' && <II label="Batería" value={record.equipmentAction.batteryType} />}
            {record.equipmentAction.notes && <II label="Notas" value={record.equipmentAction.notes} />}
          </div>
        </div>
      )}
    </div>
  );
}

// 📊 GRÁFICO HISTÓRICO DE CARGAS POR BANCO
// ═══════════════════════════════════════════════════
function LoadChart({ records, equipment }) {
  const [selBank,setSelBank]=React.useState('_total');

  const inspRecords = records
    .filter(r=>r.type==='inspeccion'&&r.measurements&&Object.keys(r.measurements).length>0)
    .slice().reverse();

  if(inspRecords.length===0) return (
    <div style={{textAlign:'center',padding:50,color:'var(--tx3)'}}>
      <div style={{fontSize:36,marginBottom:10}}>📊</div>
      <p>Aún no hay inspecciones con mediciones registradas.</p>
    </div>
  );

  const lastRec = inspRecords[inspRecords.length-1];

  // Bancos presentes en historial
  const allBanks = new Set();
  inspRecords.forEach(r=>Object.keys(r.measurements).forEach(tag=>{const b=getBankId(tag);if(b)allBanks.add(b);}));
  const bankList = ['_total',...Array.from(allBanks).sort()];

  // Series para gráfico
  const series = inspRecords.map(r=>{
    const d=r.date?.toDate?r.date.toDate():new Date(r.date);
    const label=d.toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit'});
    let total=0; const bankLoads={};
    Object.entries(r.measurements).forEach(([tag,vals])=>{
      const type=tag.toUpperCase().startsWith('INV')?'INV':tag.toUpperCase().startsWith('ETP')?'ETP':'OTR';
      const load=calcLoad(type,vals); total+=load;
      const bank=getBankId(tag); if(bank) bankLoads[bank]=(bankLoads[bank]||0)+load;
    });
    return {label,date:d,total:parseFloat(total.toFixed(2)),...bankLoads};
  });

  const dataKey = selBank==='_total'?'total':selBank;
  const dataColor = selBank==='_total'?'#10b981':'#f59e0b';
  const maxVal = Math.max(...series.map(s=>parseFloat(s[dataKey])||0),0.1);
  const barW=Math.max(6,Math.min(20,600/Math.max(series.length,1)-3));
  const H=110;

  // Calcular autonomía de todos los bancos con la última inspección
  const bankAutonomies = Array.from(allBanks).sort().map(bank=>{
    const bankLoad = Object.entries(lastRec.measurements||{}).reduce((sum,[tag,vals])=>{
      if(getBankId(tag)!==bank) return sum;
      const type=tag.toUpperCase().startsWith('INV')?'INV':tag.toUpperCase().startsWith('ETP')?'ETP':'OTR';
      return sum+calcLoad(type,vals);
    },0);
    const batEq = equipment.find(e=>e.type==='BAT'&&getBankId(e.tag)===bank);
    const aut = calcAutonomy(batEq, bankLoad);
    return {bank, bankLoad, batEq, aut};
  }).filter(x=>x.bankLoad>0||x.batEq);

  return (
    <div className="fin">

      {/* ── AUTONOMÍA POR BANCO ── */}
      {bankAutonomies.length>0 && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:'.72rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',fontFamily:"'Exo 2',sans-serif",marginBottom:10}}>
            🔋 Autonomía por Banco — última inspección
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
            {bankAutonomies.map(({bank,bankLoad,batEq,aut})=>{
              const autColor = !aut?'#64748b':aut>4?'#10b981':aut>2?'#f59e0b':'#ef4444';
              const cap=batEq?.batCapacity||null;
              const type=batEq?.batteryType||'—';
              const Vn=BAT_VN[type]||48;
              return (
                <div key={bank} style={{background:'var(--bg-surface)',border:`1px solid ${autColor}44`,borderRadius:9,padding:'13px 14px',borderLeft:`3px solid ${autColor}`}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div>
                      <span className="badge" style={{background:'rgba(139,92,246,.15)',color:'#8b5cf6',marginBottom:4,display:'block'}}>Banco {bank}</span>
                      <div style={{fontSize:'.72rem',color:'var(--tx3)'}}>
                        {cap?cap+' Ah':'—'} · {type} · {Vn}V
                      </div>
                    </div>
                    <div style={{textAlign:'right'}}>
                      <div className="fm" style={{fontSize:'1.4rem',fontWeight:800,color:autColor,lineHeight:1}}>{fmtHours(aut)}</div>
                      <div style={{fontSize:'.68rem',color:'var(--tx3)',marginTop:2}}>autonomía</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:16,fontSize:'.74rem'}}>
                    <span style={{color:'var(--tx3)'}}>Carga: <span className="fm" style={{color:'#f59e0b',fontWeight:700}}>{bankLoad>0?bankLoad.toFixed(2)+' kW':'—'}</span></span>
                    {!batEq&&<span style={{color:'#ef4444',fontSize:'.68rem'}}>⚠ Sin banco registrado</span>}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:'.68rem',color:'var(--tx4)',marginTop:8}}>
            t = (Vn × Cap × SoH × DoD × η) / Carga &nbsp;·&nbsp; Verde &gt;4h · Amarillo 2-4h · Rojo &lt;2h
          </div>
        </div>
      )}

      {/* ── SELECTOR DE BANCO PARA EL GRÁFICO ── */}
      <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
        {bankList.map(b=>(
          <button key={b} onClick={()=>setSelBank(b)}
            style={{padding:'4px 11px',borderRadius:5,border:'1px solid',fontSize:'.74rem',cursor:'pointer',
              fontFamily:"'Exo 2',sans-serif",fontWeight:600,transition:'all .15s',
              background:selBank===b?(b==='_total'?'#10b981':'#f59e0b'):'transparent',
              borderColor:b==='_total'?'#10b981':'#f59e0b',
              color:selBank===b?'#000':(b==='_total'?'#10b981':'#f59e0b')}}>
            {b==='_total'?'Total Nodo':'Banco '+b}
          </button>
        ))}
      </div>

      {/* ── GRÁFICO ── */}
      <div className="card" style={{padding:'14px 10px 8px',overflowX:'auto',marginBottom:14}}>
        <div style={{fontSize:'.7rem',color:'var(--tx3)',fontFamily:"'Exo 2',sans-serif",textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8,paddingLeft:4}}>
          Historial carga — {selBank==='_total'?'Total Nodo':'Banco '+selBank}
        </div>
        <svg viewBox={`0 0 ${Math.max(series.length*24+30,220)} ${H+32}`} style={{width:'100%',minWidth:series.length*24+30,height:'auto'}}>
          {[0,0.25,0.5,0.75,1].map(p=>(
            <line key={p} x1="28" y1={H-H*p} x2={series.length*24+28} y2={H-H*p}
              stroke="rgba(26,45,71,.7)" strokeWidth="0.6" strokeDasharray={p>0?"3,3":""}/>
          ))}
          {[0,0.5,1].map(p=>(
            <text key={p} x="2" y={H-H*p+4} fill="#475569" fontSize="6" fontFamily="JetBrains Mono">
              {(maxVal*p).toFixed(1)}
            </text>
          ))}
          {series.map((s,i)=>{
            const val=parseFloat(s[dataKey])||0;
            const bh=Math.max(2,(val/maxVal)*H);
            const x=i*24+30;
            return (
              <g key={i}>
                <rect x={x} y={H-bh} width={barW} height={bh} fill={dataColor} rx="2" opacity="0.85"/>
                <text x={x+barW/2} y={H-bh-3} fill={dataColor} fontSize="5" textAnchor="middle" fontFamily="JetBrains Mono">
                  {val>0?val.toFixed(1):''}
                </text>
                <text x={x+barW/2} y={H+10} fill="#475569" fontSize="5.5" textAnchor="middle"
                  transform={`rotate(-40,${x+barW/2},${H+10})`}>{s.label}</text>
              </g>
            );
          })}
        </svg>
      </div>

      {/* ── TABLA HISTÓRICO ── */}
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'.78rem'}}>
          <thead>
            <tr style={{borderBottom:'1px solid var(--border)'}}>
              {['Fecha','Carga (kW)','Variación'].map(h=>(
                <th key={h} style={{padding:'6px 10px',color:'var(--tx3)',fontFamily:"'Exo 2',sans-serif",fontSize:'.68rem',textTransform:'uppercase',letterSpacing:'.05em',textAlign:h==='Fecha'?'left':'right'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {[...series].reverse().map((s,i,arr)=>{
              const cur=parseFloat(s[dataKey])||0;
              const prev=arr[i+1]?parseFloat(arr[i+1][dataKey])||0:null;
              const diff=prev!==null?cur-prev:null;
              return (
                <tr key={i} style={{borderBottom:'1px solid var(--border)',background:i%2===0?'var(--bg-surface)':'transparent'}}>
                  <td style={{padding:'7px 10px',color:'var(--tx2)',fontFamily:"'JetBrains Mono',monospace"}}>{s.label}</td>
                  <td style={{padding:'7px 10px',color:'#10b981',fontFamily:"'JetBrains Mono',monospace",textAlign:'right',fontWeight:700}}>{cur.toFixed(2)}</td>
                  <td style={{padding:'7px 10px',textAlign:'right',fontFamily:"'JetBrains Mono',monospace",
                    color:diff===null?'var(--tx4)':diff>0.5?'#ef4444':diff<-0.5?'#10b981':'var(--tx3)'}}>
                    {diff!==null?(diff>0?'+':'')+diff.toFixed(2):'—'}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// 📋 HISTORIAL DE EVENTOS / EVENTUALIDADES DEL NODO
// ═══════════════════════════════════════════════════
function NodeEvents({ nodeId, nodeName, userProfile, toast }) {
  const [events,setEvents] = useState([]);
  const [loading,setLoading] = useState(true);
  const [showForm,setShowForm] = useState(false);
  const [equipment,setEquipment] = useState([]);
  const [form,setForm] = useState({date:new Date().toISOString().slice(0,16), equipo:'', description:'', notify:false});
  const [saving,setSaving] = useState(false);
  const canWrite = userProfile.role==='tecnico'||userProfile.role==='admin'||userProfile.role==='supervisor';

  useEffect(()=>{
    const u1 = db.collection('energy_nodes').doc(nodeId).collection('node_events')
      .orderBy('date','desc').onSnapshot(s=>{setEvents(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);});
    const u2 = db.collection('energy_nodes').doc(nodeId).collection('energy_equipment')
      .where('active','==',true).onSnapshot(s=>setEquipment(s.docs.map(d=>({id:d.id,...d.data()}))));
    return()=>{u1();u2();};
  },[nodeId]);

  const save = async () => {
    if(!form.description.trim()){toast('Escribe la descripción del evento.','error');return;}
    setSaving(true);
    try {
      await db.collection('energy_nodes').doc(nodeId).collection('node_events').add({
        date:      new Date(form.date),
        equipo:    form.equipo||null,
        description: form.description.trim(),
        author:    userProfile.name,
        authorId:  userProfile.uid,
        createdAt: TS(),
      });
      if(form.notify && window.emailjs && EMAILJS_SERVICE_ID!=='TU_SERVICE_ID') {
        window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
          nodo:          nodeName,
          tecnico:       userProfile.name,
          fecha:         new Date(form.date).toLocaleDateString('es-VE'),
          alarmas:       `EVENTO: ${form.equipo?'['+form.equipo+'] ':''}${form.description}`,
          observaciones: 'Evento registrado desde el sistema.',
        }, EMAILJS_PUBLIC_KEY).catch(e=>console.warn(e));
      }
      toast('Evento registrado.','success');
      setForm({date:new Date().toISOString().slice(0,16),equipo:'',description:'',notify:false});
      setShowForm(false);
    } catch(e){console.error(e);toast('Error al guardar.','error');}
    setSaving(false);
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div>
          <div className="fd" style={{fontWeight:800,fontSize:'1rem',color:'var(--tx1)'}}>📋 Historial de Eventos</div>
          <div style={{color:'var(--tx3)',fontSize:'.78rem'}}>Eventualidades registradas por el personal de monitoreo</div>
        </div>
        {canWrite && <button className="bp" style={{fontSize:'.82rem'}} onClick={()=>setShowForm(!showForm)}>
          {showForm?'Cancelar':'+ Nuevo Evento'}
        </button>}
      </div>

      {/* Formulario */}
      {showForm && (
        <div className="card fin" style={{marginBottom:14,borderColor:'rgba(59,130,246,.3)'}}>
          <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'#3b82f6',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14}}>Registrar Evento</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Fecha y Hora del Evento</label>
              <input className="fi" type="datetime-local" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} />
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Equipo Afectado <span style={{color:'var(--tx4)',fontWeight:400,textTransform:'none'}}>(opcional)</span></label>
              <select className="fi" value={form.equipo} onChange={e=>setForm({...form,equipo:e.target.value})}>
                <option value="">— Sin equipo específico —</option>
                {sortEquipment(equipment).map(eq=>(
                  <option key={eq.id} value={eq.tag}>{eq.tag} ({eq.type})</option>
                ))}
                <option value="PLANTA">Planta Eléctrica</option>
                <option value="ATS">ATS</option>
                <option value="RED_PUBLICA">Red Pública</option>
                <option value="GENERAL">General / Nodo Completo</option>
              </select>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Descripción del Evento</label>
              <textarea className="fi" rows={4} value={form.description}
                onChange={e=>setForm({...form,description:e.target.value})}
                placeholder="Describe qué ocurrió, a qué hora, condiciones observadas, acciones tomadas..."
                style={{resize:'vertical'}} />
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input type="checkbox" id="evnotif" checked={form.notify} onChange={e=>setForm({...form,notify:e.target.checked})} />
              <label htmlFor="evnotif" style={{color:'var(--tx2)',fontSize:'.85rem',cursor:'pointer'}}>📧 Notificar por correo</label>
            </div>
          </div>
          <button className="bp" style={{marginTop:14,width:'100%'}} onClick={save} disabled={saving}>
            {saving?'Guardando...':'📋 Registrar Evento'}
          </button>
        </div>
      )}

      {loading && <div style={{textAlign:'center',padding:30,color:'var(--tx3)'}}>Cargando eventos...</div>}
      {!loading && events.length===0 && !showForm && (
        <div style={{textAlign:'center',padding:40}}>
          <div style={{fontSize:36,marginBottom:10}}>📋</div>
          <p style={{color:'var(--tx3)'}}>No hay eventos registrados en este nodo.</p>
        </div>
      )}

      {events.map(ev=>{
        const d = ev.date?.toDate?ev.date.toDate():new Date(ev.date);
        return (
          <div key={ev.id} className="card" style={{marginBottom:8,borderLeft:'3px solid #3b82f6'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6,flexWrap:'wrap',gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span className="fm" style={{fontSize:'.8rem',color:'#3b82f6',fontWeight:700}}>
                  {d.toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'})} {d.toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'})}
                </span>
                {ev.equipo && <span className="badge" style={{background:'rgba(59,130,246,.12)',color:'#3b82f6'}}>{ev.equipo}</span>}
              </div>
              <span style={{color:'var(--tx4)',fontSize:'.72rem'}}>{ev.author}</span>
            </div>
            <p style={{color:'#cbd5e1',fontSize:'.88rem',lineHeight:1.6}}>{ev.description}</p>
          </div>
        );
      })}
    </div>
  );
}

// 🔔 ALERTAS / COMENTARIOS IMPORTANTES DEL NODO
// ═══════════════════════════════════════════════════
const ALERT_PRIORITIES = {
  critica:  { label:'Crítica',   color:'#ef4444', bg:'rgba(239,68,68,.12)',   icon:'🔴' },
  alta:     { label:'Alta',      color:'#f59e0b', bg:'rgba(245,158,11,.12)',  icon:'🟡' },
  media:    { label:'Media',     color:'#3b82f6', bg:'rgba(59,130,246,.12)',  icon:'🔵' },
  info:     { label:'Info',      color:'#10b981', bg:'rgba(16,185,129,.12)',  icon:'🟢' },
};

function NodeAlerts({ nodeId, nodeName, userProfile, toast }) {
  const [section,setSection] = useState('alertas'); // alertas | eventos
  const [alerts,setAlerts] = useState([]);
  const [loading,setLoading] = useState(true);
  const [showForm,setShowForm] = useState(false);

  const canWrite = userProfile.role==='tecnico'||userProfile.role==='admin'||userProfile.role==='supervisor';

  useEffect(()=>{
    const u = db.collection('energy_nodes').doc(nodeId).collection('node_alerts')
      .orderBy('createdAt','desc')
      .onSnapshot(s=>{
        setAlerts(s.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      });
    return u;
  },[nodeId]);

  const sendEmail = async (alertData) => {
    if(!window.emailjs || EMAILJS_SERVICE_ID==='TU_SERVICE_ID') return;
    try {
      await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        nodo:          nodeName,
        tecnico:       userProfile.name,
        fecha:         new Date().toLocaleDateString('es-VE'),
        alarmas:       `[${alertData.priority.toUpperCase()}] ${alertData.title}

${alertData.body}`,
        observaciones: 'Alerta manual registrada en la app.',
      }, EMAILJS_PUBLIC_KEY);
    } catch(e){ console.warn('EmailJS:', e); }
  };

  const save = async () => {
    if(!form.title.trim()||!form.body.trim()){toast('Completa título y descripción.','error');return;}
    setSaving(true);
    try {
      await db.collection('energy_nodes').doc(nodeId).collection('node_alerts').add({
        title:    form.title.trim(),
        body:     form.body.trim(),
        priority: form.priority,
        status:   'activa',
        author:   userProfile.name,
        authorId: userProfile.uid,
        createdAt:TS(),
      });
      if(form.notify) await sendEmail(form);
      toast('Alerta registrada'+(form.notify?' y notificada por correo.':'.'), 'success');
      setForm({title:'',body:'',priority:'alta',notify:true});
      setShowForm(false);
    } catch(e){ console.error(e); toast('Error al guardar.','error'); }

  const activas  = alerts.filter(a=>a.status!=='resuelta');

  return (
    <div className="fin">

        {[['alertas','🔔 Alertas','#ef4444'],['eventos','📋 Eventos','#3b82f6']].map(([k,lbl,c])=>(
          <button key={k} onClick={()=>{setSection(k);setShowForm(false);}}
            style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${c}44`,cursor:'pointer',
              fontFamily:"'Exo 2',sans-serif",fontWeight:700,fontSize:'.82rem',transition:'all .15s',
              background:section===k?c:'transparent',color:section===k?'#fff':c}}>
            {lbl}
          </button>
        ))}
      </div>

      {section==='eventos' && <NodeEvents nodeId={nodeId} nodeName={nodeName} userProfile={userProfile} toast={toast} equipment={[]} />}

      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div>
          <div className="fd" style={{fontWeight:800,fontSize:'1rem',color:'var(--tx1)'}}>
            🔔 Alertas del Nodo
            {activas.length>0&&<span style={{marginLeft:8,background:'#ef4444',color:'#fff',borderRadius:'50%',width:20,height:20,display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'.7rem',fontWeight:700}}>{activas.length}</span>}
          </div>
          <div style={{color:'var(--tx3)',fontSize:'.78rem'}}>Comentarios importantes y condiciones a vigilar</div>
        </div>
        {canWrite && <button className="bp" style={{fontSize:'.82rem'}} onClick={()=>setShowForm(!showForm)}>
          {showForm?'Cancelar':'+ Nueva Alerta'}
        </button>}
      </div>

      {/* Formulario nueva alerta */}
      {showForm && (
        <div className="card fin" style={{marginBottom:16,borderColor:'rgba(245,158,11,.3)'}}>
          <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:14}}>Nueva Alerta</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Título</label>
              <input className="fi" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}
                placeholder="Ej: Banco LFP02 con temperatura elevada" />
            </div>
            <div>
              <label className="lbl">Prioridad</label>
              <select className="fi" value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>
                {Object.entries(ALERT_PRIORITIES).map(([k,v])=>(
                  <option key={k} value={k}>{v.icon} {v.label}</option>
                ))}
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,paddingTop:22}}>
              <input type="checkbox" id="notif" checked={form.notify} onChange={e=>setForm({...form,notify:e.target.checked})} />
              <label htmlFor="notif" style={{color:'var(--tx2)',fontSize:'.85rem',cursor:'pointer'}}>
                📧 Notificar por correo
              </label>
            </div>
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Descripción</label>
              <textarea className="fi" rows={4} value={form.body} onChange={e=>setForm({...form,body:e.target.value})}
                placeholder="Describe la situación, qué se observó y qué se recomienda..." style={{resize:'vertical'}} />
            </div>
          </div>
          <button className="bp" style={{marginTop:14,width:'100%'}} onClick={save} disabled={saving}>
            {saving?'Guardando...':'🔔 Registrar Alerta'}
          </button>
        </div>
      )}

      {loading && <div style={{textAlign:'center',padding:40,color:'var(--tx3)'}}>Cargando alertas...</div>}

      {/* Alertas activas */}
      {!loading && activas.length===0 && !showForm && (
        <div style={{textAlign:'center',padding:40}}>
          <div style={{fontSize:36,marginBottom:10}}>✅</div>
          <p style={{color:'var(--tx3)'}}>No hay alertas activas en este nodo.</p>
        </div>
      )}

      {activas.map(a=>{
        const p=ALERT_PRIORITIES[a.priority]||ALERT_PRIORITIES.info;
        return (
          <div key={a.id} className="card" style={{marginBottom:10,borderLeft:`4px solid ${p.color}`,background:p.bg}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontSize:16}}>{p.icon}</span>
                <span className="fd" style={{fontWeight:700,fontSize:'.95rem',color:'var(--tx1)'}}>{a.title}</span>
                <span className="badge" style={{background:p.bg,color:p.color,border:`1px solid ${p.color}44`}}>{p.label}</span>
              </div>
              {canWrite && <button className="bg" style={{padding:'4px 12px',fontSize:'.74rem',flexShrink:0}} onClick={()=>resolve(a.id)}>
                ✓ Resolver
              </button>}
            </div>
            <p style={{color:'#cbd5e1',fontSize:'.88rem',lineHeight:1.6,marginBottom:8}}>{a.body}</p>
            <div style={{fontSize:'.72rem',color:'var(--tx4)'}}>
              Por {a.author} · {a.createdAt?.toDate?a.createdAt.toDate().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—'}
            </div>
          </div>
        );
      })}

      {/* Alertas resueltas */}
      {resueltas.length>0 && (
        <div style={{marginTop:20}}>
          <div style={{fontSize:'.7rem',color:'var(--tx4)',textTransform:'uppercase',letterSpacing:'.08em',fontFamily:"'Exo 2',sans-serif",marginBottom:8}}>
            ✅ Resueltas ({resueltas.length})
          </div>
          {resueltas.map(a=>{
            const p=ALERT_PRIORITIES[a.priority]||ALERT_PRIORITIES.info;
            return (
              <div key={a.id} style={{background:'var(--bg-surface)',borderRadius:7,padding:'10px 12px',marginBottom:6,opacity:.55,borderLeft:`3px solid ${p.color}`}}>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span>{p.icon}</span>
                  <span style={{color:'var(--tx2)',fontSize:'.85rem',fontWeight:600,textDecoration:'line-through'}}>{a.title}</span>
                </div>
                <div style={{fontSize:'.7rem',color:'var(--tx4)',marginTop:3}}>
                  Resuelto por {a.resolvedBy||'—'} · {a.resolvedAt?.toDate?a.resolvedAt.toDate().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'}):'—'}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </>}
    </div>
  );
}

// ✏️  MODAL EDICIÓN DE EQUIPO
// ═══════════════════════════════════════════════════
function EditEqModal({ eq, onSave, onClose }) {
  const [f,setF]=useState({
    tag:       eq.tag||'',
    type:      eq.type||'INV',
    voltage:   eq.voltage||'220V',
    hasAcIn:   !!eq.hasAcIn,
    hasAcOut:  !!eq.hasAcOut,
    hasDcOut:  !!eq.hasDcOut,
    hasSolar:  !!eq.hasSolar,
    batteryType:   eq.batteryType||'No aplica',
    batCapacity:   eq.batCapacity||'',
    batCount:      eq.batCount||'',
    batCellType:   eq.batCellType||'No aplica',
    conductorGauge:eq.conductorGauge||'',
    serial:    eq.serial||'',
    notes:     eq.notes||'',
  });
  const [saving,setSaving]=useState(false);

  const save = async () => {
    if(!f.tag.trim()){return;}
    setSaving(true);
    await onSave({...f, tag:f.tag.trim().toUpperCase()});
    setSaving(false);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="card fin" style={{maxWidth:500,width:'100%',maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
          <h3 className="fd" style={{fontWeight:700,fontSize:'1rem',color:'var(--amber)'}}>✏️ Editar Equipo</h3>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--tx3)',cursor:'pointer',fontSize:20}}>✕</button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{gridColumn:'1/-1'}}>
            <label className="lbl">Tag</label>
            <input className="fi fm" value={f.tag} onChange={e=>setF({...f,tag:e.target.value})} placeholder="INV00-PV-LFP00" />
          </div>
          <div>
            <label className="lbl">Tipo</label>
            <select className="fi" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>
              {Object.entries(EQ_TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          {f.type==='INV' && (
            <div>
              <label className="lbl">Tensión</label>
              <select className="fi" value={f.voltage} onChange={e=>setF({...f,voltage:e.target.value})}>
                <option value="110V">110V</option>
                <option value="220V">220V</option>
              </select>
            </div>
          )}
          {f.type==='INV' && (
            <div style={{gridColumn:'1/-1',display:'flex',flexWrap:'wrap',gap:16,paddingTop:4}}>
              {[['hasAcIn','🔌 Entrada AC'],['hasAcOut','⚡ Salida AC'],['hasDcOut','🔋 Salida DC'],['hasSolar','☀️ PV']].map(([k,lbl])=>(
                <label key={k} style={{display:'flex',alignItems:'center',gap:6,color:'var(--tx2)',fontSize:'.84rem',cursor:'pointer'}}>
                  <input type="checkbox" checked={!!f[k]} onChange={e=>setF({...f,[k]:e.target.checked})} />{lbl}
                </label>
              ))}
            </div>
          )}
          {(f.type==='INV'||f.type==='ETP'||f.type==='BAT') && (
            <div>
              <label className="lbl">Tipo Batería</label>
              <select className="fi" value={f.batteryType} onChange={e=>setF({...f,batteryType:e.target.value})}>
                {BAT_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          )}
          {f.type==='BAT' && <>
            <div>
              <label className="lbl">Capacidad (Ah)</label>
              <input className="fi" type="number" step="any" value={f.batCapacity} onChange={e=>setF({...f,batCapacity:e.target.value})} placeholder="200" />
            </div>
            <div>
              <label className="lbl">N° Baterías</label>
              <input className="fi" type="number" step="1" value={f.batCount} onChange={e=>setF({...f,batCount:e.target.value})} placeholder="4" />
            </div>
            <div>
              <label className="lbl">Tipo Celda</label>
              <select className="fi" value={f.batCellType} onChange={e=>setF({...f,batCellType:e.target.value})}>
                {BAT_CELL_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
          </>}
          {f.type==='ATS' && (
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Calibre del Conductor (opcional)</label>
              <select className="fi" value={f.conductorGauge} onChange={e=>setF({...f,conductorGauge:e.target.value})}>
                <option value="">-- Sin calibre definido --</option>
                {AWG_OPTIONS.map(o=><option key={o} value={o}>{o} — máx {AWG_AMPACITY[o]}A</option>)}
              </select>
            </div>
          )}
          {(f.type==='INV'||f.type==='ETP'||f.type==='BAT') && (
            <div style={{gridColumn:'1/-1'}}>
              <label className="lbl">Serial del Equipo</label>
              <input className="fi fm" value={f.serial} onChange={e=>setF({...f,serial:e.target.value})} placeholder="Ej: P02362013757" />
            </div>
          )}
          <div style={{gridColumn:'1/-1'}}>
            <label className="lbl">Notas</label>
            <input className="fi" value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="Modelo, serie, observaciones..." />
          </div>
        </div>

        <div style={{display:'flex',gap:10,marginTop:18}}>
          <button className="bp" style={{flex:1}} onClick={save} disabled={saving||!f.tag.trim()}>
            {saving?'Guardando...':'💾 Guardar Cambios'}
          </button>
          <button className="bs" onClick={onClose} disabled={saving}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}
