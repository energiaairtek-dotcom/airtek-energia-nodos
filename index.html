// 🏭 DETALLE DE NODO
// ═══════════════════════════════════════════════════
function NodeDetail({ node, userProfile, onBack, toast }) {
  const [tab,setTab]=useState('equipos');
  const [equipment,setEquipment]=useState([]);
  const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);
  const [subView,setSubView]=useState('main'); // main | newRecord | recordDetail
  const [selRecord,setSelRecord]=useState(null);
  const [qrOpen,setQrOpen]=useState(false);
  const [filterType,setFilterType]=useState('all');
  const [editEq,setEditEq]=useState(null); // equipo siendo editado

  useEffect(()=>{
    const u1=db.collection('energy_nodes').doc(node.id).collection('energy_equipment')
      .onSnapshot(s=>{setEquipment(s.docs.map(d=>({id:d.id,...d.data()})));setLoading(false);});
    const u2=db.collection('energy_nodes').doc(node.id).collection('energy_records')
      .orderBy('date','desc').onSnapshot(s=>{setRecords(s.docs.map(d=>({id:d.id,...d.data()})));});
    return()=>{u1();u2();};
  },[node.id]);

  const exportPDF = () => {
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    const pw=doc.internal.pageSize.getWidth();
    // Header
    doc.setFillColor(7,16,31); doc.rect(0,0,210,297,'F');
    doc.setFillColor(245,158,11); doc.rect(0,0,210,12,'F');
    doc.setTextColor(0,0,0); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('AIRTEK ENERGÍA — REPORTE DE NODO', 15, 8);
    doc.text(new Date().toLocaleDateString('es-VE'), pw-15, 8, {align:'right'});
    let y=22;
    doc.setTextColor(245,158,11); doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.text(node.name, 15, y); y+=6;
    doc.setTextColor(148,163,184); doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text(`Zona: ${node.zone||'—'} | Tipo: ${(NODE_TYPES[node.type]||{}).label||node.type}`, 15, y); y+=10;
    // Equipos
    const actEq=sortEquipment(equipment.filter(e=>e.active!==false));
    doc.setTextColor(16,185,129); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('EQUIPOS ACTIVOS', 15, y); y+=6;
    if(actEq.length===0){doc.setTextColor(71,85,105);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Sin equipos registrados.',18,y);y+=5;}
    actEq.forEach(eq=>{
      doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','normal');
      const line=`• ${eq.tag} — ${eq.type}${eq.voltage?' '+eq.voltage:''}${eq.batteryType&&eq.batteryType!=='No aplica'?' ['+eq.batteryType+']':''}`;
      doc.text(line,18,y); y+=5; if(y>270){doc.addPage();doc.setFillColor(7,16,31);doc.rect(0,0,210,297,'F');y=20;}
    });
    y+=5;
    // Registros
    doc.setTextColor(245,158,11); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('HISTORIAL DE REGISTROS', 15, y); y+=6;
    if(records.length===0){doc.setTextColor(71,85,105);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('Sin registros.',18,y);y+=5;}
    records.forEach(r=>{
      const rt=REC_TYPES[r.type]||{label:r.type,icon:'·'};
      doc.setTextColor(255,255,255); doc.setFontSize(9); doc.setFont('helvetica','bold');
      doc.text(`${rt.label} — ${fmtDate(r.date)}`, 18, y); y+=4;
      doc.setFont('helvetica','normal'); doc.setTextColor(148,163,184);
      doc.text(`Técnico: ${r.technicianName} | Turno: ${r.shift==='dia'?'Día':'Noche'}`, 21, y); y+=4;
      if(r.observations){
        const lines=doc.splitTextToSize(`Obs: ${r.observations}`,165);
        lines.forEach(l=>{doc.text(l,21,y);y+=4;if(y>270){doc.addPage();doc.setFillColor(7,16,31);doc.rect(0,0,210,297,'F');y=20;}});
      }
      if(r.measurements){
        Object.entries(r.measurements).forEach(([tag,vals])=>{
          doc.setTextColor(245,158,11); doc.setFontSize(8);
          doc.text(tag, 21, y); y+=4;
          const parts=Object.entries(vals).filter(([,v])=>v!==''&&v!==null).map(([k,v])=>`${k.replace(/_/g,' ')}: ${v}`).join('  |  ');
          if(parts){const ls=doc.splitTextToSize(parts,160);doc.setTextColor(16,185,129);ls.forEach(l=>{doc.text(l,24,y);y+=4;if(y>270){doc.addPage();doc.setFillColor(7,16,31);doc.rect(0,0,210,297,'F');y=20;}});}
        });
      }
      y+=3; if(y>270){doc.addPage();doc.setFillColor(7,16,31);doc.rect(0,0,210,297,'F');y=20;}
    });
    doc.save(`${slugify(node.name)}-historial.pdf`);
    toast('PDF generado','success');
  };

  const exportXLSX = () => {
    // Hoja 1: Inspecciones ordenadas por banco — carga por equipo + carga por banco + ATS
    const measRows=[];
    const inspRecs = records.filter(r=>r.type==='inspeccion'&&r.measurements&&Object.keys(r.measurements).length>0);
    inspRecs.forEach(r=>{
      const fecha=fmtDate(r.date);
      const hora=r.date?.toDate?r.date.toDate().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}):'';
      const meas=r.measurements||{};
      // Reconstruir grupos ordenados
      const fakeEqs=sortEquipment(Object.keys(meas).map(tag=>{
        const t=tag.toUpperCase();
        const type=t.startsWith('INV')?'INV':t.startsWith('ETP')?'ETP':t.startsWith('ATS')?'ATS':t.startsWith('BAT')?'BAT':'OTR';
        return {id:tag,tag,type,active:true};
      }));
      const groups=groupByBank(fakeEqs);
      groups.forEach(({bank,eqs,bat,orphanBats})=>{
        let bankLoad=0;
        // Equipos del grupo
        eqs.forEach(eq=>{
          const vals=meas[eq.tag]||{};
          const load=calcLoad(eq.type,vals);
          bankLoad+=load;
          const row={'Fecha':fecha,'Hora':hora,'Banco':bank||'—','Equipo':eq.tag,'Tipo':eq.type,'Carga (kW)':load>0?load.toFixed(3):''};
          // ATS: L1, L2, N
          if(eq.type==='ATS'){row['L1 (A)']=vals.L1||'';row['L2 (A)']=vals.L2||'';row['N (A)']=vals.N||'';}
          measRows.push(row);
        });
        // Banco BAT con V banco
        if(bat&&meas[bat.tag]){
          const vals=meas[bat.tag]||{};
          const batEq=equipment.find(e=>e.tag===bat.tag)||{};
          const aut=bankLoad>0?calcAutonomy(batEq,bankLoad):null;
          measRows.push({
            'Fecha':fecha,'Hora':hora,'Banco':bank||'—','Equipo':bat.tag,'Tipo':'BAT',
            'Carga (kW)':'','V Banco (VDC)':vals.V_banco||'','I Banco (A)':vals.I_banco||'',
            'Autonomía (h)':aut?aut.toFixed(2):''
          });
        }
        // Carga total del banco
        if(bank&&bank!=='_ats'&&bankLoad>0){
          measRows.push({'Fecha':fecha,'Hora':hora,'Banco':bank,'Equipo':'→ TOTAL BANCO','Tipo':'','Carga (kW)':bankLoad.toFixed(3)});
        }
      });
    });
    // Hoja 2: Resumen
    const recRows=inspRecs.map(r=>({
      'Fecha':fmtDate(r.date),
      'Hora':r.date?.toDate?r.date.toDate().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}):'',
      'Turno':r.shift==='dia'?'Día':'Noche',
      'Observaciones':r.observations||'',
    }));
    const eqRows=equipment.map(e=>({
      'Tag': e.tag, 'Serial': e.serial||'', 'Tipo': e.type, 'Tensión': e.voltage||'',
      'Panel Solar': e.hasSolar?'Sí':'No', 'Batería': e.batteryType||'',
      'Capacidad (Ah)': e.batCapacity||'', 'N° Baterías': e.batCount||'', 'Tipo Celda': e.batCellType||'',
      'Estado': e.active!==false?'Activo':'Retirado',
      'Instalado': fmtDate(e.installedAt), 'Instalado por': e.installedBy||'',
      'Notas': e.notes||'',
    }));
    const wb=XLSX.utils.book_new();
    if(measRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(measRows), 'Inspecciones');
    if(recRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(recRows), 'Resumen');
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(eqRows), 'Equipos');
    XLSX.writeFile(wb, `${slugify(node.name)}-datos.xlsx`);
    toast('Excel generado','success');
  };

  const tc=NODE_TYPES[node.type]||{label:'—',color:'#64748b'};
  const filtered=filterType==='all'?records:records.filter(r=>r.type===filterType);
  const canWrite=userProfile.role==='tecnico'||userProfile.role==='admin'||userProfile.role==='supervisor';

  if(subView==='newRecord') return <RecordForm nodeId={node.id} nodeName={node.name} equipment={equipment} userProfile={userProfile} onSave={()=>setSubView('main')} onCancel={()=>setSubView('main')} toast={toast} />;
  if(subView==='recordDetail'&&selRecord) return <RecordDetail record={selRecord} nodeId={node.id} onBack={()=>setSubView('main')} />;

  const saveEditEq = async (data) => {
    try {
      await db.collection('energy_nodes').doc(node.id).collection('energy_equipment').doc(editEq.id).update(data);
      toast('Equipo actualizado.','success');
      setEditEq(null);
    } catch(e) { toast('Error al guardar.','error'); }
  };

  const deleteEq = async (eq) => {
    if(!window.confirm(`¿Eliminar permanentemente el equipo ${eq.tag}?
Esta acción no se puede deshacer.`)) return;
    try {
      await db.collection('energy_nodes').doc(node.id).collection('energy_equipment').doc(eq.id).delete();
      toast('Equipo eliminado.','success');
    } catch(e) { toast('Error al eliminar.','error'); }
  };

  return (
    <div className="fin">
      {qrOpen && <QRModal node={node} onClose={()=>setQrOpen(false)} />}
      {editEq && <EditEqModal eq={editEq} onSave={saveEditEq} onClose={()=>setEditEq(null)} />}

      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16,gap:12}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <button onClick={onBack} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:22,flexShrink:0}}>←</button>
          <div>
            <h2 className="fd" style={{fontSize:'1.2rem',fontWeight:800,color:'var(--tx1)',lineHeight:1.2}}>{node.name}</h2>
            <div style={{display:'flex',gap:8,marginTop:5,flexWrap:'wrap',alignItems:'center'}}>
              <span className="badge" style={{background:tc.color+'22',color:tc.color}}>{tc.label}</span>
              <span style={{color:'var(--tx3)',fontSize:'.8rem'}}>📍 {node.zone}</span>
            </div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          <button className="bs" style={{padding:'6px 12px',fontSize:'.78rem'}} onClick={()=>setQrOpen(true)}>QR</button>
          {canWrite && <button className="bp" style={{padding:'7px 14px',fontSize:'.8rem'}} onClick={()=>setSubView('newRecord')}>+ Registro</button>}
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
        {[
          {label:'Equipos Activos', val:equipment.filter(e=>e.active!==false).length, c:'#10b981'},
          {label:'Registros',        val:records.length, c:'#3b82f6'},
          {label:'Última Visita',    val:records[0]?fmtDate(records[0].date):'—', c:'#f59e0b', sm:true},
        ].map(s=>(
          <div key={s.label} style={{background:'var(--bg-surface)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 13px'}}>
            <div style={{fontSize:'.68rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',fontFamily:"'Exo 2',sans-serif",marginBottom:4}}>{s.label}</div>
            <div className={s.sm?'':'fm'} style={{fontSize:s.sm?'.85rem':'1.4rem',fontWeight:700,color:s.c}}>{s.val}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{borderBottom:'1px solid var(--border)',marginBottom:16,display:'flex',overflowX:'auto'}}>
        {[['equipos','Equipos'],['historial','Historial'],['cargas','Cargas'],['alertas','🔔 Alertas'],['exportar','Exportar']].map(([k,lbl])=>(
          <button key={k} className={`tab ${tab===k?'on':''}`} onClick={()=>setTab(k)} style={{whiteSpace:'nowrap'}}>{lbl}</button>
        ))}
      </div>

      {/* TAB EQUIPOS */}
      {tab==='equipos' && (
        <div>
          {loading ? <div style={{color:'var(--tx3)',textAlign:'center',padding:50}}>Cargando equipos...</div>
          : equipment.length===0 ? (
            <div style={{textAlign:'center',padding:50}}>
              <div style={{fontSize:38,marginBottom:10}}>⚡</div>
              <p style={{color:'var(--tx3)',marginBottom:14}}>No hay equipos registrados en este nodo.</p>
              {canWrite && <button className="bp" onClick={()=>setSubView('newRecord')}>Registrar Instalación</button>}
            </div>
          ) : ['active','retired'].map(status=>{
            const eqs=sortEquipment(equipment.filter(e=>status==='active'?e.active!==false:e.active===false));
            if(!eqs.length) return null;
            return (
              <div key={status} style={{marginBottom:16}}>
                <div style={{fontSize:'.72rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8,fontFamily:"'Exo 2',sans-serif"}}>
                  {status==='active'?'✅ Activos':'❌ Retirados'}
                </div>
                {eqs.map(eq=>{
                  const ti=EQ_TYPES[eq.type]||EQ_TYPES.OTR;
                  return (
                    <div key={eq.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${ti.color}`,opacity:status==='retired'?.5:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span className="badge" style={{background:ti.bg,color:ti.color}}>{eq.type}</span>
                        <span className="fm" style={{fontSize:'.92rem',fontWeight:600,color:'var(--tx1)'}}>{eq.tag}</span>
                        {eq.voltage && <span style={{color:'var(--tx3)',fontSize:'.74rem'}}>⚡{eq.voltage}</span>}
                        {eq.hasAcIn  && <span style={{color:'#3b82f6',fontSize:'.73rem'}}>AC/IN</span>}
                        {eq.hasAcOut && <span style={{color:'#10b981',fontSize:'.73rem'}}>AC/OUT</span>}
                        {eq.hasDcOut && <span style={{color:'#8b5cf6',fontSize:'.73rem'}}>DC/OUT</span>}
                        {eq.hasSolar && <span style={{color:'#f59e0b',fontSize:'.73rem'}}>☀️ PV</span>}
                        {eq.batteryType&&eq.batteryType!=='No aplica' && <span style={{color:'#8b5cf6',fontSize:'.73rem'}}>🔋{eq.batteryType}</span>}
                        {eq.batCapacity && <span style={{color:'#8b5cf6',fontSize:'.73rem'}}>{eq.batCapacity}Ah</span>}
                        {eq.batCount && <span style={{color:'#8b5cf6',fontSize:'.73rem'}}>{eq.batCount} bat.</span>}
                        {eq.batCellType&&eq.batCellType!=='No aplica' && <span style={{color:'#64748b',fontSize:'.73rem'}}>{eq.batCellType}</span>}
                        <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
                          <span style={{color:'var(--tx4)',fontSize:'.72rem'}}>{fmtDate(eq.installedAt)}</span>
                          {canWrite && <button onClick={()=>setEditEq(eq)}
                            style={{background:'none',border:'1px solid var(--border)',color:'var(--tx3)',padding:'2px 8px',borderRadius:4,cursor:'pointer',fontSize:'.72rem',fontFamily:"'Exo 2',sans-serif"}}>
                            ✏️ Editar
                          </button>}
                          {userProfile.role==='admin' && <button onClick={()=>deleteEq(eq)}
                            style={{background:'none',border:'1px solid rgba(239,68,68,.3)',color:'#ef4444',padding:'2px 8px',borderRadius:4,cursor:'pointer',fontSize:'.72rem',fontFamily:"'Exo 2',sans-serif"}}>
                            🗑️
                          </button>}
                        </span>
                      </div>
                      {eq.serial && <div style={{marginTop:4,fontSize:'.72rem',color:'var(--tx4)',fontFamily:"'JetBrains Mono',monospace"}}>S/N: {eq.serial}</div>}
                      {eq.notes && <div style={{marginTop:4,fontSize:'.78rem',color:'var(--tx3)'}}>{eq.notes}</div>}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* TAB CARGAS */}
      {tab==='cargas' && <LoadChart records={records} equipment={equipment} />}

      {/* TAB HISTORIAL */}
      {tab==='historial' && (
        <div>
          <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
            {['all',...Object.keys(REC_TYPES)].map(k=>{
              const rt=REC_TYPES[k];
              const active=filterType===k;
              return (
                <button key={k} onClick={()=>setFilterType(k)}
                  style={{padding:'4px 10px',borderRadius:5,border:'1px solid',fontSize:'.74rem',cursor:'pointer',fontFamily:"'Exo 2',sans-serif",fontWeight:600,transition:'all .15s',
                    background:active?(k==='all'?'#1a2d47':(rt?.color||'#64748b')):'transparent',
                    borderColor:k==='all'?'#243d5e':(rt?.color||'#64748b'),
                    color:active?'#fff':(k==='all'?'#94a3b8':(rt?.color||'#64748b'))}}>
                  {k==='all'?'Todos':`${rt.icon} ${rt.label}`}
                </button>
              );
            })}
          </div>
          {filtered.length===0
            ? <div style={{textAlign:'center',padding:40}}><p style={{color:'var(--tx3)'}}>No hay registros{filterType!=='all'?' de este tipo':''}.</p></div>
            : filtered.map(r=>{
                const rt=REC_TYPES[r.type]||{label:r.type,icon:'📋',color:'#64748b'};
                return (
                  <div key={r.id} className="card rrow" style={{marginBottom:8,borderLeft:`3px solid ${rt.color}`}}
                    onClick={()=>{setSelRecord(r);setSubView('recordDetail');}}>

                      <div>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>

      {/* TAB EXPORTAR */}
      {tab==='exportar' && (
        <div>
          <p style={{color:'var(--tx3)',fontSize:'.9rem',marginBottom:20}}>Exporta toda la información registrada de este nodo.</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
            {[
              {icon:'📄',label:'PDF',desc:'Reporte completo con mediciones, equipos e historial',fn:exportPDF,cls:'bs'},
              {icon:'📊',label:'Excel',desc:'Tablas separadas: registros y equipos para análisis',fn:exportXLSX,cls:'bs'},
            ].map(x=>(
              <div key={x.label} className="card" style={{textAlign:'center'}}>
                <div style={{fontSize:38,marginBottom:8}}>{x.icon}</div>

                <button className={x.cls} style={{width:'100%'}} onClick={x.fn}>Descargar {x.label}</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// 🗺️  LISTA DE NODOS (DASHBOARD PRINCIPAL)
// ═══════════════════════════════════════════════════
function NodeList({ userProfile, toast }) {
  const [nodes,setNodes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [search,setSearch]=useState('');
  const [fType,setFType]=useState('all');

  useEffect(()=>{
    const u=db.collection('energy_nodes').where('active','==',true).onSnapshot(s=>{
      setNodes(s.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
    return u;
  },[]);

  // Deep link via ?node=id
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    const nid=p.get('node');
    if(nid&&nodes.length>0){const n=nodes.find(n=>n.id===nid);if(n)setSel(n);}
  },[nodes]);

  if(sel) return <NodeDetail node={sel} userProfile={userProfile} onBack={()=>setSel(null)} toast={toast} />;

  const filtered=nodes.filter(n=>{
    const ms=n.name.toLowerCase().includes(search.toLowerCase())||(n.zone||'').toLowerCase().includes(search.toLowerCase());
    return ms&&(fType==='all'||n.type===fType);
  });

  return (
    <div className="fin">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 className="fd" style={{fontSize:'1.5rem',fontWeight:800,color:'var(--tx1)'}}>Nodos de Red</h1>
          <p style={{color:'var(--tx3)',fontSize:'.85rem'}}>{nodes.length} nodos activos registrados</p>
        </div>
      </div>
      {/* Filtros */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <input className="fi" style={{maxWidth:260,flex:1}} placeholder="Buscar nodo o zona..." value={search} onChange={e=>setSearch(e.target.value)} />
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['all',...Object.keys(NODE_TYPES)].map(t=>{
            const nt=NODE_TYPES[t];
            const on=fType===t;
            return (
              <button key={t} onClick={()=>setFType(t)}
                style={{padding:'7px 13px',borderRadius:6,border:'1px solid',cursor:'pointer',fontFamily:"'Exo 2',sans-serif",fontSize:'.76rem',fontWeight:600,transition:'all .15s',
                  background:on?(t==='all'?'#1a2d47':(nt?.color||'#64748b')):'transparent',
                  borderColor:t==='all'?'#243d5e':(nt?.color||'#64748b'),
                  color:on?'#fff':(t==='all'?'#94a3b8':(nt?.color||'#64748b'))}}>
                {t==='all'?'Todos':nt.label}
              </button>
            );
          })}
        </div>
      </div>
      {loading ? <div style={{color:'var(--tx3)',textAlign:'center',padding:70}}>Cargando nodos...</div>
      : filtered.length===0 ? <div style={{color:'var(--tx3)',textAlign:'center',padding:70}}>No se encontraron nodos.</div>
      : (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(270px,1fr))',gap:12}}>
          {filtered.map(n=>{
            const tc=NODE_TYPES[n.type]||{label:'—',color:'#64748b'};
            return (
              <div key={n.id} className="card ncard" style={{cursor:'pointer',borderLeft:`3px solid ${tc.color}`}}
                onClick={()=>setSel(n)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <span className="badge" style={{background:tc.color+'22',color:tc.color}}>{tc.label}</span>
                  <span style={{color:'var(--border-bright)',fontSize:20}}>›</span>
                </div>
                <div className="fd" style={{fontSize:'1rem',fontWeight:700,color:'var(--tx1)',marginBottom:4,lineHeight:1.3}}>{n.name}</div>
                <div style={{color:'var(--tx4)',fontSize:'.8rem'}}>📍 {n.zone}</div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function UID_AddForm({ toast, userProfile, onDone }) {
  const [uid,setUid]=useState('');
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [role,setRole]=useState('tecnico');
  const [loading,setLoading]=useState(false);

  const save = async () => {
    if(!uid.trim()||!name.trim()){toast('UID y nombre son requeridos.','error');return;}
    setLoading(true);
    try {
      const docRef = db.collection('energy_users').doc(uid.trim());
      const existing = await docRef.get();
      if(existing.exists){toast('Este UID ya tiene documento en energy_users.','warn');setLoading(false);return;}
      await docRef.set({
        name:name.trim(), email:email.trim().toLowerCase(),
        role, approved:true, createdAt:TS()
      });
      toast('Usuario agregado exitosamente. Ya puede ingresar con su contraseña existente.','success');
      setUid('');setName('');setEmail('');setRole('tecnico');
      onDone();
    } catch(e){console.error(e);toast('Error: '+e.message,'error');}
    setLoading(false);
  };

  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <div style={{gridColumn:'1/-1'}}>
        <label className="lbl">UID de Firebase Auth</label>
        <input className="fi fm" value={uid} onChange={e=>setUid(e.target.value)} placeholder="Ej: HxhK9DQ8EcYpQu4q4itjDo7vlxI2" />
      </div>
      <div>
        <label className="lbl">Nombre completo</label>
        <input className="fi" value={name} onChange={e=>setName(e.target.value)} placeholder="Juan Pérez" />
      </div>
      <div>
        <label className="lbl">Correo (referencia)</label>
        <input className="fi" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="correo@airtek.com" />
      </div>
      <div>
        <label className="lbl">Rol</label>
        <select className="fi" value={role} onChange={e=>setRole(e.target.value)}>
          <option value="tecnico">Técnico</option>
          <option value="supervisor">Supervisor</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div style={{gridColumn:'1/-1'}}>
        <button className="bi" style={{width:'100%',padding:'10px'}} onClick={save} disabled={loading}>
          {loading?'Guardando...':'✅ Agregar Usuario'}
        </button>
      </div>
    </div>
  );
}

// 🛡️  PANEL DE ADMINISTRACIÓN
// ═══════════════════════════════════════════════════
function AdminPanel({ userProfile, toast }) {
  const [tab,setTab]=useState('usuarios');
  const [users,setUsers]=useState([]);
  const [nodes,setNodes]=useState([]);
  const [ldU,setLdU]=useState(true);
  const [ldN,setLdN]=useState(true);
  const [newNode,setNN]=useState({name:'',zone:'',type:'fibra'});
  const [seeding,setSeeding]=useState(false);
  const [selNodeId,setSelNodeId]=useState('');
  const [bulkText,setBulkText]=useState('');
  const [bulkParsed,setBulkParsed]=useState([]);
  const [bulkLoading,setBulkLoading]=useState(false);

  useEffect(()=>{
    const u=db.collection('energy_users').onSnapshot(s=>{setUsers(s.docs.map(d=>({id:d.id,...d.data()})));setLdU(false);});
    const n=db.collection('energy_nodes').onSnapshot(s=>{setNodes(s.docs.map(d=>({id:d.id,...d.data()})));setLdN(false);});
    return()=>{u();n();};
  },[]);

  const parseBulk = txt => {
    const lines = txt.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
    const parsed = lines.map((line,i) => {
      const parts = line.split('|').map(p=>p.trim());
      const tag = parts[0]||'';
      const typeRaw = (parts[1]||'').toUpperCase();
      const type = Object.keys(EQ_TYPES).includes(typeRaw) ? typeRaw : 'OTR';
      const voltage = parts[2]||'220V';
      const batRaw = (parts[3]||'').toUpperCase();
      const batteryType = BAT_TYPES.find(b=>b.toUpperCase()===batRaw)||'No aplica';
      const hasSolar = ['SI','SÍ','YES','S','1','TRUE'].includes((parts[4]||'').toUpperCase().trim());
      // notes handled below with bank fields
      const batCapacity = parts[5]||'';
      const batCount = parts[6]||'';
      const batCellRaw = (parts[7]||'').trim();
      const batCellType = ['Prismática','Cilíndrica','Pouch'].find(c=>c.toLowerCase()===batCellRaw.toLowerCase())||'No aplica';
      const notes = parts[8]||parts[5]||''; // fallback for old 6-col format
      return { tag, type, voltage, batteryType, hasSolar, batCapacity, batCount, batCellType, notes, valid:!!tag, _line:i+1 };
    });
    setBulkParsed(parsed);
  };

  const importEquipment = async () => {
    if (!selNodeId) { toast('Selecciona un nodo primero.','error'); return; }
    const valid = bulkParsed.filter(e=>e.valid);
    if (!valid.length) { toast('No hay equipos válidos para importar.','error'); return; }
    setBulkLoading(true);
    try {
      const batch = db.batch();
      valid.forEach(eq => {
        const ref = db.collection('energy_nodes').doc(selNodeId).collection('energy_equipment').doc();
        const {_line, valid:_v, ...data} = eq;
        batch.set(ref,{...data,active:true,installedAt:new Date(),installedBy:userProfile.name,createdAt:TS()},{merge:true});
      });
      await batch.commit();
      toast(valid.length+' equipos importados.','success');
      setBulkText(''); setBulkParsed([]); setSelNodeId('');
    } catch(e){ console.error(e); toast('Error al importar.','error'); }
    setBulkLoading(false);
  };

  const approve=(uid,val,role)=>{
    db.collection('energy_users').doc(uid).update({approved:val,role});
    toast(val?'Usuario aprobado.':'Acceso revocado.','success');
  };

  const addNode=async()=>{
    if(!newNode.name){toast('Ingresa el nombre del nodo.','error');return;}
    await db.collection('energy_nodes').add({...newNode,active:true,createdAt:TS()});
    setNN({name:'',zone:'',type:'fibra'});
    toast('Nodo agregado.','success');
  };

  const toggleNode=async(n)=>{
    await db.collection('energy_nodes').doc(n.id).update({active:!n.active});
    toast(n.active?'Nodo desactivado.':'Nodo activado.','success');
  };

  const seedNodes=async()=>{
    if(!window.confirm('¿Cargar los 23 nodos iniciales de Airtek Zulia?\nEsta acción es idempotente y se puede repetir sin duplicar.')) return;
    setSeeding(true);
    const batch=db.batch();
    SEED_NODES.forEach(n=>{
      const ref=db.collection('energy_nodes').doc(slugify(n.name));
      batch.set(ref,{...n,active:true,createdAt:TS()},{merge:true});
    });
    await batch.commit();
    toast('23 nodos cargados exitosamente.','success');
    setSeeding(false);
  };

  const pending=users.filter(u=>!u.approved);

  return (
    <div className="fin">
      <h2 className="fd" style={{fontSize:'1.3rem',fontWeight:800,color:'var(--tx1)',marginBottom:22}}>Panel de Administración</h2>
      <div style={{borderBottom:'1px solid var(--border)',marginBottom:20,display:'flex'}}>
        {[['usuarios',`Usuarios${pending.length>0?' ('+pending.length+')':''}`],['nodos','Nodos'],['equipos','Carga Equipos']].map(([k,lbl])=><button key={k} className={`tab ${tab===k?'on':''}`} onClick={()=>setTab(k)}>{lbl}</button>)}
      </div>

      {/* USUARIOS */}
      {tab==='usuarios' && (
        <div>
          {pending.length>0 && <div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,padding:'10px 14px',marginBottom:16,color:'#fcd34d',fontSize:'.85rem'}}>
            ⚠️ {pending.length} usuario(s) pendiente(s) de aprobación
          </div>}
          <AddExistingUser nodes={nodes} toast={toast} userProfile={userProfile} />
          {ldU ? <div style={{color:'var(--tx3)',textAlign:'center',padding:40}}>Cargando...</div>
          : users.map(u=>(
            <div key={u.id} className="card" style={{marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
              <div>
                <div className="fd" style={{fontWeight:600,color:'var(--tx1)'}}>{u.name}</div>
                <div style={{color:'var(--tx3)',fontSize:'.8rem'}}>{u.email}</div>
                <div style={{display:'flex',gap:6,marginTop:5}}>
                  <span className="badge" style={{background:u.approved?'rgba(16,185,129,.15)':'rgba(245,158,11,.15)',color:u.approved?'#10b981':'#f59e0b'}}>
                    {u.approved?'Aprobado':'Pendiente'}
                  </span>
                  <span className="badge" style={{background:'rgba(59,130,246,.15)',color:'#3b82f6'}}>{u.role}</span>
                </div>
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <select style={{background:'var(--bg-surface)',border:'1px solid var(--border)',color:'var(--tx2)',padding:'5px 9px',borderRadius:5,fontSize:'.8rem',cursor:'pointer'}}
                  value={u.role} onChange={e=>db.collection('energy_users').doc(u.id).update({role:e.target.value}).then(()=>toast('Rol actualizado','success'))}>
                  <option value="tecnico">Técnico</option>
                  <option value="supervisor">Supervisor</option>
                  <option value="admin">Admin</option>
                </select>
                {!u.approved && <button className="bg" style={{padding:'6px 14px',fontSize:'.8rem'}} onClick={()=>approve(u.id,true,u.role)}>Aprobar</button>}
                {u.approved && u.id!==userProfile.uid && <button className="bd" onClick={()=>approve(u.id,false,u.role)}>Revocar</button>}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* EQUIPOS - CARGA MASIVA */}
      {tab==='equipos' && (
        <div>

function ChangePasswordModal({ onClose, toast }) {
  const [cur,setCur]=useState('');
  const [p1,setP1]=useState('');
  const [p2,setP2]=useState('');
  const [loading,setLoading]=useState(false);

  const save = async () => {
    if (!cur||!p1||!p2){toast('Completa todos los campos.','error');return;}
    if (p1!==p2){toast('Las contraseñas nuevas no coinciden.','error');return;}
    if (p1.length<6){toast('La contraseña debe tener al menos 6 caracteres.','error');return;}
    setLoading(true);
    try {
      const user = auth.currentUser;
      const cred = firebase.auth.EmailAuthProvider.credential(user.email, cur);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(p1);
      toast('Contraseña actualizada exitosamente.','success');
      onClose();
    } catch(e) {
      if(e.code==='auth/wrong-password') toast('Contraseña actual incorrecta.','error');
      else toast('Error: '+e.message,'error');
    }
    setLoading(false);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="card fin" style={{maxWidth:380,width:'100%'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <span style={{fontSize:20}}>🔑</span>
          <h3 className="fd" style={{fontWeight:700,fontSize:'1rem',color:'var(--tx1)'}}>Cambiar Contraseña</h3>
        </div>
        <div style={{marginBottom:12}}>
          <label className="lbl">Contraseña actual</label>
          <input className="fi" type="password" value={cur} onChange={e=>setCur(e.target.value)} placeholder="••••••••" />
        </div>
        <div style={{marginBottom:12}}>
          <label className="lbl">Nueva contraseña</label>
          <input className="fi" type="password" value={p1} onChange={e=>setP1(e.target.value)} placeholder="••••••••" />
        </div>
        <div style={{marginBottom:20}}>
          <label className="lbl">Confirmar nueva contraseña</label>
          <input className="fi" type="password" value={p2} onChange={e=>setP2(e.target.value)} placeholder="••••••••"
            onKeyDown={e=>e.key==='Enter'&&save()} />
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="bp" style={{flex:1}} onClick={save} disabled={loading}>{loading?'Guardando...':'Actualizar'}</button>
          <button className="bs" onClick={onClose} disabled={loading}>Cancelar</button>
        </div>
        <p style={{marginTop:12,fontSize:'.75rem',color:'var(--tx4)',textAlign:'center'}}>
          ⚠️ La contraseña se actualizará en todas las apps que usen este correo.
        </p>
      </div>
    </div>
  );
}

// Standalone input para autonomía — FUERA del componente para evitar pérdida de foco
function AutonomiaInput({label, val, onChange, unit, small}) {
  return (
    <div>
      <label style={{display:'block',fontSize:'.65rem',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3,fontFamily:"'Exo 2',sans-serif"}}>

      </label>

        style={{fontSize:small?'.8rem':'.88rem'}} placeholder="0" />

function AutonomiaCalc() {
  const [bancos, setBancos] = useState([
    { id:1, tipo:'LFP', capacidad:'', Vn:'48', SoH:'1.0', DoD:'0.8', ebanco:'0.98', eTemp:'1.0', carga:'', resultado:null }
  ]);

  const addBanco = () => setBancos(prev=>[...prev,{
    id:Date.now(), tipo:'LFP', capacidad:'', Vn:'48', SoH:'1.0', DoD:'0.8', ebanco:'0.98', eTemp:'1.0', carga:'', resultado:null
  }]);

  const removeBanco = id => setBancos(prev=>prev.filter(b=>b.id!==id));

  const updateBanco = (id, key, val) => setBancos(prev=>prev.map(b=>{
    if(b.id!==id) return b;
    const nb = {...b, [key]:val};
    // Auto-fill defaults when type changes
    if(key==='tipo') {
      const def = BAT_DEFAULTS[val]||BAT_DEFAULTS.LFP;
      const Vn = BAT_VN[val]||48;
      nb.Vn = String(Vn);
      nb.DoD = String(def.DoD);
      nb.SoH = String(def.SoH);
      nb.ebanco = String(def.ebanco);
    }
    // Recalculate autonomy
    const toNum = s => parseFloat((s||'').toString().replace(',','.'));
    const cap=toNum(nb.capacidad)||0;
    const load=toNum(nb.carga)||0;
    if(cap>0 && load>0) {
      const Vn=toNum(nb.Vn)||48;
      const SoH=toNum(nb.SoH)||1;
      const DoD=toNum(nb.DoD)||0.8;
      const eb=toNum(nb.ebanco)||0.95;
      const eT=toNum(nb.eTemp)||1;
      const ereg=(BAT_DEFAULTS[nb.tipo]||BAT_DEFAULTS.LFP).ereg;
      nb.resultado = (Vn*cap*SoH*DoD*eb*eT)/(load*1000/ereg);
    } else {
      nb.resultado = null;
    }
    return nb;
  }));

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div>
          <div className="fd" style={{fontSize:'.85rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.06em'}}>Calculadora de Autonomía</div>
          <div style={{fontSize:'.74rem',color:'var(--tx4)',marginTop:2}}>t = (Vn × Cap × SoH × DoD × η) / (Carga_kW × 1000 / ηreg)</div>
        </div>
        <button className="bg" style={{fontSize:'.8rem',padding:'7px 14px'}} onClick={addBanco}>+ Banco</button>
      </div>

      {bancos.map((b,idx)=>{
        const autColor = !b.resultado?'#64748b':b.resultado>4?'#10b981':b.resultado>2?'#f59e0b':'#ef4444';
        return (
          <div key={b.id} className="card" style={{marginBottom:12,borderLeft:`3px solid ${autColor}`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span className="fd" style={{fontWeight:700,color:'var(--tx1)',fontSize:'.9rem'}}>Banco {idx+1}</span>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                {b.resultado && (
                  <div style={{textAlign:'right'}}>
                    <div className="fm" style={{fontSize:'1.5rem',fontWeight:800,color:autColor,lineHeight:1}}>{fmtHours(b.resultado)}</div>
                    <div style={{fontSize:'.65rem',color:'var(--tx3)'}}>autonomía estimada</div>
                  </div>
                )}
                {bancos.length>1&&<button onClick={()=>removeBanco(b.id)} className="bd" style={{padding:'4px 10px',fontSize:'.72rem'}}>✕</button>}
              </div>
            </div>

            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:10}}>
              <div>
                <label className="lbl">Tipo de Batería</label>
                <select className="fi" value={b.tipo} onChange={e=>updateBanco(b.id,'tipo',e.target.value)}>
                  {['LFP','NMC','GEL','AGM','VRLA'].map(t=><option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <AutonomiaInput label="Capacidad" unit="Ah" val={b.capacidad} onChange={v=>updateBanco(b.id,'capacidad',v)} />
              <AutonomiaInput label="Carga del Banco" unit="kW" val={b.carga} onChange={v=>updateBanco(b.id,'carga',v)} />
              <AutonomiaInput label="Vn Banco" unit="V" val={b.Vn} onChange={v=>updateBanco(b.id,'Vn',v)} small />
              <AutonomiaInput label="SoH (0-1)" unit="" val={b.SoH} onChange={v=>updateBanco(b.id,'SoH',v)} small />
              <AutonomiaInput label="DoD (0-1)" unit="" val={b.DoD} onChange={v=>updateBanco(b.id,'DoD',v)} small />
              <AutonomiaInput label="η Banco" unit="" val={b.ebanco} onChange={v=>updateBanco(b.id,'ebanco',v)} small />
              <AutonomiaInput label="η Temp" unit="" val={b.eTemp} onChange={v=>updateBanco(b.id,'eTemp',v)} small />
            </div>

            {!b.resultado&&b.capacidad&&b.carga&&(
              <div style={{marginTop:8,fontSize:'.75rem',color:'#f59e0b'}}>⚠ Completa capacidad y carga para calcular.</div>
            )}
          </div>
        );
      })}

      {bancos.some(b=>b.resultado) && (
        <div style={{background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',borderRadius:8,padding:'12px 16px',marginTop:4}}>
          <div className="fd" style={{fontSize:'.72rem',fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:8}}>Resumen</div>
          {bancos.filter(b=>b.resultado).map((b,i)=>(
            <div key={b.id} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
              <span style={{color:'var(--tx2)',fontSize:'.85rem'}}>Banco {i+1} — {b.tipo} {b.capacidad}Ah</span>
              <span className="fm" style={{fontWeight:700,color:b.resultado>4?'#10b981':b.resultado>2?'#f59e0b':'#ef4444'}}>{fmtHours(b.resultado)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MaterialesCalc() {
  const [tab,setTab]=useState('fuentes');
  const [proyecto,setProyecto]=useState('');
  const [resFuentes,setResFuentes]=useState([]);
  const [resRack,setResRack]=useState([]);
  const [resEsc,setResEsc]=useState([]);

  // Fuentes state
  const [fF,setFF]=useState({cantFuentes:'',calibre:'',rect:'',inv:'',solar:''});
  // Rack state
  const [fR,setFR]=useState({racks:'',baterias:''});
  // Escalerillas state
  const [fE,setFE]=useState({soportes:''});

  const calcFuentes = () => {
    const n=parseInt(fF.cantFuentes)||0; if(!n||!fF.calibre){setResFuentes([]);return;}
    const vals={inversores:parseInt(fF.inv)||0,rectificadores:parseInt(fF.rect)||0,modulosSolares:parseInt(fF.solar)||0};
    const lista=MAT_FUENTES.map(m=>{
      let cant=m.formula?(vals[m.formula]||0)*(m.mult||1):m.base;
      let total=cant*n;
      if(total<=0) return null;
      const nombre=m.dinamico?m.nombre.replace('{calibre}',fF.calibre):m.nombre;
      return {nombre,cantidad:Number.isInteger(total)?total:total.toFixed(2),comentario:m.comentario||''};
    }).filter(Boolean);
    setResFuentes(lista);
  };

  const calcRack = () => {
    const racks=parseInt(fR.racks)||0, bats=parseInt(fR.baterias)||0;
    if(!racks||!bats){setResRack([]);return;}
    setResRack(MAT_RACK.map(m=>{
      const mult=m.factor==='racks'?racks:bats;
      const total=m.base*mult;
      return {nombre:m.nombre,cantidad:Number.isInteger(total)?total:total.toFixed(2),comentario:m.comentario||''};
    }).filter(i=>i.cantidad>0));
  };

  const calcEsc = () => {
    const s=parseInt(fE.soportes)||0;
    if(!s){setResEsc([]);return;}
    setResEsc(MAT_ESC.map(m=>{
      const total=m.base*s;
      return {nombre:m.nombre,cantidad:total,comentario:''};
    }));
  };

  const copy = (lista,cat) => {
    let txt=`MATERIALES - ${cat.toUpperCase()}\n${new Date().toLocaleString()}\n`;
    if(proyecto) txt+=`Proyecto: ${proyecto}\n`;
    txt+='\n';
    lista.forEach(i=>txt+=`${i.nombre}\t${i.cantidad}\n`);
    navigator.clipboard.writeText(txt);
  };

  const exportXls = (lista,cat) => {
    let html=`<html><head><meta charset="UTF-8"></head><body><h2>Materiales - ${cat}</h2>`;
    if(proyecto) html+=`<p>Proyecto: ${proyecto}</p>`;
    html+=`<table border="1"><tr><th>Material</th><th>Cantidad</th><th>Comentario</th></tr>`;
    lista.forEach(i=>html+=`<tr><td>${i.nombre}</td><td>${i.cantidad}</td><td>${i.comentario||''}</td></tr>`);
    html+=`</table></body></html>`;
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([html],{type:'application/vnd.ms-excel'}));
    a.download=`materiales_${cat}_${Date.now()}.xls`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const FI = ({label,val,onChange,placeholder,type='number'}) => (
    <div>
      <label className="lbl">{label}</label>
      <input className="fi" type={type} value={val} onChange={e=>onChange(e.target.value)} placeholder={placeholder||'0'} />
    </div>
  );

  return (
    <div className="fin">
      <div style={{marginBottom:20}}>
        <h1 className="fd" style={{fontSize:'1.4rem',fontWeight:800,color:'var(--tx1)',marginBottom:4}}>🧮 Calculadora de Materiales</h1>
        <p style={{color:'var(--tx3)',fontSize:'.85rem'}}>Operaciones y Mantenimiento de Energía</p>
      </div>

      {/* Nombre de proyecto */}
      <div className="card" style={{marginBottom:16}}>
        <label className="lbl">Nombre del Proyecto (opcional)</label>
        <input className="fi" type="text" value={proyecto} onChange={e=>setProyecto(e.target.value)} placeholder="Ej: Nodo Bella Vista — Instalación ETP" />
      </div>

      {/* Tabs */}
      <div style={{borderBottom:'1px solid var(--border)',marginBottom:18,display:'flex',overflowX:'auto'}}>
        {[['fuentes','⚡ Fuentes ETP'],['rack','🔋 Rack + Baterías'],['escalerillas','🏗️ Escalerillas'],['autonomia','🔋 Autonomía']].map(([k,lbl])=>(
          <button key={k} className={`tab ${tab===k?'on':''}`} onClick={()=>setTab(k)} style={{whiteSpace:'nowrap'}}>{lbl}</button>
        ))}
      </div>

      {/* TAB FUENTES */}
      {tab==='fuentes' && (
        <div>
          <div className="card" style={{marginBottom:14}}>
            <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>Fuentes ETP Huawei 23006</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <FI label="Cantidad de fuentes ETP" val={fF.cantFuentes} onChange={v=>setFF({...fF,cantFuentes:v})} />
              <div>
                <label className="lbl">Calibre de alimentación AC</label>
                <select className="fi" value={fF.calibre} onChange={e=>setFF({...fF,calibre:e.target.value})}>
                  <option value="">-- Selecciona --</option>
                  {['14 AWG','12 AWG','10 AWG','8 AWG','6 AWG','4 AWG','3 AWG','2 AWG','1 AWG','1/0 AWG','2/0 AWG','3/0 AWG','4/0 AWG','250 kcmil','300 kcmil','350 kcmil','400 kcmil','500 kcmil'].map(c=>(
                    <option key={c} value={c}>{c} — máx {AWG_AMPACITY[c]||'—'}A</option>
                  ))}
                </select>
              </div>
              <FI label="Módulos rectificadores por fuente" val={fF.rect} onChange={v=>setFF({...fF,rect:v})} />
              <FI label="Módulos inversores por fuente" val={fF.inv} onChange={v=>setFF({...fF,inv:v})} />
              <FI label="Módulos solares MPPT por fuente" val={fF.solar} onChange={v=>setFF({...fF,solar:v})} />
            </div>
            <button className="bp" style={{marginTop:14,fontSize:'.85rem'}} onClick={calcFuentes}>📐 Calcular Materiales</button>
          </div>
          <ResultTable items={resFuentes} onCopy={()=>copy(resFuentes,'fuentes')} onExport={()=>exportXls(resFuentes,'fuentes')} />
        </div>
      )}

      {/* TAB RACK */}
      {tab==='rack' && (
        <div>
          <div className="card" style={{marginBottom:14}}>
            <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>Rack Strig 42U + Baterías Pylontech</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <FI label="Cantidad de racks" val={fR.racks} onChange={v=>setFR({...fR,racks:v})} />
              <FI label="Cantidad de baterías Pylontech" val={fR.baterias} onChange={v=>setFR({...fR,baterias:v})} />
            </div>
            <button className="bp" style={{marginTop:14,fontSize:'.85rem'}} onClick={calcRack}>📐 Calcular Materiales</button>
          </div>
          <ResultTable items={resRack} onCopy={()=>copy(resRack,'rack')} onExport={()=>exportXls(resRack,'rack')} />
        </div>
      )}

      {/* TAB AUTONOMÍA */}
      {tab==='autonomia' && <AutonomiaCalc />}

      {/* TAB ESCALERILLAS */}
      {tab==='escalerillas' && (
        <div>
          <div className="card" style={{marginBottom:14}}>
            <h3 className="fd" style={{fontSize:'.78rem',fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:14}}>Escalerillas y Soportes</h3>
            <div style={{maxWidth:260}}>
              <FI label="Cantidad de soportes" val={fE.soportes} onChange={v=>setFE({...fE,soportes:v})} />
            </div>
            <button className="bp" style={{marginTop:14,fontSize:'.85rem'}} onClick={calcEsc}>📐 Calcular Materiales</button>
          </div>
          <ResultTable items={resEsc} onCopy={()=>copy(resEsc,'escalerillas')} onExport={()=>exportXls(resEsc,'escalerillas')} />
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// 🚀 APP ROOT
// ═══════════════════════════════════════════════════
function App() {
  const [authState,setAuthState]=useState('loading');
  const [userProfile,setUserProfile]=useState(null);
  const [authView,setAuthView]=useState('login');
  const [appView,setAppView]=useState('nodes');
  const [toastData,setToastData]=useState(null);

  const toast=useCallback((msg,type='info')=>setToastData({msg,type,key:Date.now()}),[]);

  // Detectar QR público ANTES de requerir login
  const publicNodeId = new URLSearchParams(window.location.search).get('node');
  const isPublic = !!publicNodeId && authState!=='authenticated';

  useEffect(()=>{
    if(!auth){setAuthState('error');return;}
    return auth.onAuthStateChanged(async user=>{
      if(!user){setAuthState('unauthenticated');setUserProfile(null);return;}
      try {
        console.log('Auth OK, uid:', user.uid);
        const doc=await db.collection('energy_users').doc(user.uid).get();
        console.log('Firestore doc exists:', doc.exists, doc.data());
        if(!doc.exists){
          console.warn('No energy_users doc for uid:', user.uid);
          setAuthState('unauthenticated');
          return;
        }
        const p={uid:user.uid,...doc.data()};
        console.log('Profile:', p);
        setUserProfile(p);
        setAuthState(p.approved?'authenticated':'pending');
      } catch(e) {
        console.error('Firestore error:', e.code, e.message);
        setAuthState('unauthenticated');
      }
    });
  },[]);

  const logout=()=>auth.signOut();

  // Vista pública por QR — sin login requerido
  if(publicNodeId && authState!=='authenticated') return <PublicNodeView nodeId={publicNodeId} />;

  // Loading
  if(authState==='loading') return (
    <div className="gridbg" style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:50,height:50,background:'#f59e0b',borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26,margin:'0 auto 12px',boxShadow:'0 0 28px rgba(245,158,11,.3)'}}>⚡</div>
        <div className="fd" style={{color:'#f59e0b',fontWeight:800,fontSize:'1.2rem',letterSpacing:'.04em'}}>AIRTEK</div>
        <div style={{color:'var(--tx4)',fontSize:'.78rem',marginTop:4}}>Inicializando sistema...</div>
      </div>
    </div>
  );

  if(authState==='error') return (
    <div className="gridbg" style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="card" style={{maxWidth:400,textAlign:'center'}}>
        <div style={{fontSize:40,marginBottom:14}}>⚠️</div>
        <h2 className="fd" style={{color:'#f59e0b',marginBottom:8}}>Configuración requerida</h2>
        <p style={{color:'#94a3b8',fontSize:'.9rem'}}>Reemplaza las credenciales de Firebase en el archivo HTML y recarga la página.</p>
      </div>
    </div>
  );

  if(authState==='unauthenticated') {
    if(authView==='register') return <RegisterPage onBack={()=>setAuthView('login')} />;
    return <LoginPage onRegister={()=>setAuthView('register')} />;
  }

  if(authState==='pending') return <PendingPage onLogout={logout} />;

  return (
    <div style={{minHeight:'100vh',background:'var(--bg-deep)'}}>
      <Topbar userProfile={userProfile} view={appView} setView={setAppView} onLogout={logout} toast={toast} />
      <div style={{maxWidth:980,margin:'0 auto',padding:'22px 16px'}}>
        {appView==='nodes' && <NodeList userProfile={userProfile} toast={toast} />}
        {appView==='calc'  && <MaterialesCalc />}
        {appView==='admin' && userProfile.role==='admin' && <AdminPanel userProfile={userProfile} toast={toast} />}
        {appView==='admin' && userProfile.role!=='admin' && <NodeList userProfile={userProfile} toast={toast} />}
      </div>
      {toastData && <Toast key={toastData.key} msg={toastData.msg} type={toastData.type} onDone={()=>setToastData(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
